          }
        });
      }, [activeTab, text]);

      /**
       * Restores the original Markdown text before cleaning.
       * Uses the saved copy in originalMdTexts for the active tab.
       */
      const handleRestoreOriginal = useCallback(() => {
        const orig = originalMdTexts[activeTab];
        if (orig !== undefined && orig !== null) {
          pushToHistory(activeTab, text);
          setText(orig);
          pushToHistory(activeTab, orig);
          setIsDirty(true);
        } else {
          setCustomAlert({
            title: "Restaurar original",
            message: "Nenhum texto original guardado para este documento."
          });
        }
      }, [activeTab, text, originalMdTexts]);

      // %%SECTION: HANDLERS - Find/Replace
      /**
       * Finds all occurrences of findText in the current text.
       * Updates findOccurrences array and highlights the first match.
       */
      const handleFind = useCallback(() => {
        if (!findText) return;
        const flags = findCase ? "g" : "gi";
        const regex = new RegExp(findText.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"), flags);
        const matches = text.match(regex);
        setFindResult(matches ? `${matches.length} ocorrência(s) encontrada(s).` : "Nenhuma ocorrência encontrada.");
        // Also compute all occurrences for navigation
        const occurrences = findAllOccurrences(text, findText, findCase);
        setFindOccurrences(occurrences);
        if (occurrences.length > 0) {
          setFindCurrentIdx(0);
          // Highlight first occurrence in textarea
          scrollToOccurrence(occurrences[0]);
        }
      }, [findText, findCase, text]);

      /**
       * Returns all occurrences of searchText in sourceText.
       * @param {string} sourceText - The text to search in
       * @param {string} searchText - The text to search for
       * @param {boolean} caseSensitive - Whether to match case
       * @returns {Array<{start:number, end:number}>} Array of match positions
       */
      const findAllOccurrences = useCallback((sourceText, searchText, caseSensitive) => {
        if (!searchText) return [];
        const flags = caseSensitive ? "g" : "gi";
        const escaped = searchText.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
        const regex = new RegExp(escaped, flags);
        const results = [];
        let match;
        while ((match = regex.exec(sourceText)) !== null) {
          results.push({ start: match.index, end: match.index + match[0].length });
          if (!flags.includes("g")) break; // safety for non-global
        }
        return results;
      }, []);

      /**
       * Scrolls the textarea to show the given occurrence and selects it.
       * @param {{start:number, end:number}} occ - The occurrence to scroll to
       */
      const scrollToOccurrence = useCallback((occ) => {
        const textarea = textareaRef.current;
        if (!textarea) return;
        textarea.setSelectionRange(occ.start, occ.end);
        textarea.focus();
      }, []);

      /**
       * Navigates to the next or previous occurrence.
       * @param {number} direction - 1 for next, -1 for previous
       */
      const navigateOccurrence = useCallback((direction) => {
        if (findOccurrences.length === 0) return;
        let nextIdx = findCurrentIdx + direction;
        if (nextIdx < 0) nextIdx = findOccurrences.length - 1;
        if (nextIdx >= findOccurrences.length) nextIdx = 0;
        setFindCurrentIdx(nextIdx);
        scrollToOccurrence(findOccurrences[nextIdx]);
      }, [findOccurrences, findCurrentIdx]);

      /**
       * Replaces all occurrences of findText with replaceText in the current text.
       * Updates history for undo/redo.
       */
      const handleReplace = useCallback(() => {
        if (!findText) return;
        const flags = findCase ? "g" : "gi";
        const regex = new RegExp(findText.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"), flags);
        pushToHistory(activeTab, text);
        const nextVal = text.replace(regex, replaceText);
        setText(nextVal);
        pushToHistory(activeTab, nextVal);
        setFindResult("Substituição realizada."); setIsDirty(true);
      }, [findText, findCase, activeTab, text]);

      /**
       * Opens the "Save as Audio" modal with the current tab name as default filename.
       */
      const handleSaveAudio = useCallback(() => {
        if (!text.trim()) { setCustomAlert({ title: "Aviso", message: "Nenhum texto para converter em áudio!" }); return; }
        setSaveFileName(tabs[activeTab]); setShowSaveModal(true);
      }, [text, tabs, activeTab]);

      /**
       * Starts recording the TTS playback to an audio file using MediaRecorder.
       * Uses getDisplayMedia to capture tab audio (requires user permission).
       */
      const confirmSave = useCallback(async () => {
        if (!ttsSupported || !text.trim()) return;
        setRecordError("");
        try {
          const stream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
          const audioTracks = stream.getAudioTracks();
          if (!audioTracks.length) {
            stream.getTracks().forEach(t => t.stop());
            setRecordError('Nenhum áudio compartilhado. Marque "Compartilhar áudio da aba" e tente de novo.');
            return;
          }
          const audioStream = new MediaStream(audioTracks);
          const mimeType = MediaRecorder.isTypeSupported("audio/webm;codecs=opus") ? "audio/webm;codecs=opus" : "audio/webm";
          const recorder = new MediaRecorder(audioStream, { mimeType });
          recordedChunksRef.current = [];
          recorder.ondataavailable = e => { if (e.data.size > 0) recordedChunksRef.current.push(e.data); };
          recorder.onstop = () => {
            stream.getTracks().forEach(t => t.stop());
            const blob = new Blob(recordedChunksRef.current, { type: mimeType });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a"); a.href = url;
            a.download = `${saveFileName || "narracao"}.webm`; a.click();
            URL.revokeObjectURL(url); setIsRecording(false);
          };
          audioTracks[0].addEventListener("ended", () => {
            if (mediaRecorderRef.current?.state !== "inactive") mediaRecorderRef.current.stop();
          });
          mediaRecorderRef.current = recorder; setShowSaveModal(false); setIsRecording(true); recorder.start();
          window.speechSynthesis.cancel();
          const utter = new SpeechSynthesisUtterance(plainText);
          if (selectedVoice) utter.voice = selectedVoice;
          utter.rate = rate; utter.pitch = pitch; utter.volume = volume;
          utter.lang = selectedVoice?.lang || "pt-BR";
          utter.onend = () => { setTimeout(() => { if (mediaRecorderRef.current?.state !== "inactive") mediaRecorderRef.current.stop(); }, 400); };
          utter.onerror = () => { if (mediaRecorderRef.current?.state !== "inactive") mediaRecorderRef.current.stop(); };
          window.speechSynthesis.speak(utter);
        } catch { setRecordError("Permissão de captura negada ou indisponível."); }
      }, [ttsSupported, plainText, selectedVoice, rate, pitch, volume, saveFileName]);

      /**
       * Saves the current text content as a .txt file download.
       */
      const handleSaveText = useCallback(() => {
        const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a"); a.href = url;
        a.download = `${tabs[activeTab]}.txt`; a.click();
        URL.revokeObjectURL(url); setIsDirty(false);
      }, [text, tabs, activeTab]);

      /**
       * Creates a new empty document in the current tab.
       * Prompts for confirmation if there are unsaved changes.
       */
      const handleNewDoc = useCallback(() => {
        if (isDirty && text) {
          setCustomConfirm({
            title: "Criar Novo Documento",
            message: "Deseja descartar as alterações não salvas?",
            onAccept: () => {
              const updated = [...tabTexts]; updated[activeTab] = "";
              setTabTexts(updated); setText(""); setIsDirty(false); handleStop();
            }
          });
        } else {
          const updated = [...tabTexts]; updated[activeTab] = "";
          setTabTexts(updated); setText(""); setIsDirty(false); handleStop();
        }
      }, [isDirty, text, tabTexts, activeTab, handleStop]);

      /**
       * Selects all text content in the editor (contentEditable mode).
       */
      const handleSelectAll = useCallback(() => {
        if (editorRef.current) {
          const range = document.createRange(); range.selectNodeContents(editorRef.current);
          const sel = window.getSelection(); sel?.removeAllRanges(); sel?.addRange(range);
        }
      }, []);

      /**
       * Copies selected text or all text to clipboard.
       * Falls back to document.execCommand for older browsers.
       */
      const handleCopy = useCallback(async () => {
        const sel = window.getSelection()?.toString() || text;
        try { await navigator.clipboard.writeText(sel); }
        catch {
          const el = document.createElement("textarea"); el.value = sel;
          document.body.appendChild(el); el.select(); document.execCommand("copy"); document.body.removeChild(el);
        }
      }, [text]);

      /**
       * Pastes text from clipboard into the editor.
       * Falls back to alert if clipboard API is unavailable.
       */
      const handlePaste = useCallback(async () => {
        try { const t = await navigator.clipboard.readText(); setText(prev => prev + t); setIsDirty(true); }
        catch { setCustomAlert({ title: "Erro", message: "Use Ctrl+V diretamente no editor." }); }
      }, []);

      /**
       * Plays a test phrase with the currently selected voice and settings.
       */
      const testVoice = useCallback(() => {
        const utter = new SpeechSynthesisUtterance("Olá! Testando o timbre da nova voz.");
        if (selectedVoice) utter.voice = selectedVoice;
        utter.rate = rate; utter.pitch = pitch; utter.volume = volume;
        utter.lang = selectedVoice?.lang || "pt-BR";
        window.speechSynthesis.cancel(); window.speechSynthesis.speak(utter);
      }, [selectedVoice, rate, pitch, volume]);

      // %%SECTION: EFFECTS - Outside Click to Close Menus
      useEffect(() => {
        const h = () => {
          setActiveMenu(null);
          setShowMdDropdown(false);
          setShowSizeDropdown(false);
        };
        document.addEventListener("mousedown", h);
        return () => document.removeEventListener("mousedown", h);
      }, []);

      const toggleMenu = (name, e) => { e.stopPropagation(); setActiveMenu(prev => prev === name ? null : name); };
      const menuAction = fn => { setActiveMenu(null); fn(); };

      const s = getIconSize(buttonSize);
      const wordCount = text.trim() ? text.trim().split(/\s+/).length : 0;
      const charCount = text.length;
      const lineCount = text.split("\n").length;
      const zoomedFontSize = Math.round(fontSettings.size * zoom / 100);

      return (
        <div
          style={{
            display: "flex", flexDirection: "column", height: "100vh", width: "100vw", overflow: "hidden",
            background: "#ece9d8", position: "relative"
          }}
          onDragOver={handleDragOver} onDragLeave={handleDragLeave} onDrop={handleDrop}
        >
          <input type="file" ref={fileInputRef} style={{ display: "none" }} multiple
            accept=".txt,.md,.rtf,.html,.pdf" onChange={handleFileChange} />

          {isDraggingFile && (
            <div className="drag-overlay">
              <div className="drag-box">
                <span style={{ fontSize: 48 }}>📥</span>
                <h2 style={{ fontWeight: "bold", fontSize: 14 }}>Solte seus arquivos aqui!</h2>
                <p style={{ fontSize: 12, color: "#6b7280" }}>Abertos em abas automaticamente</p>
              </div>
            </div>
          )}

          {/* Title Bar */}
          <div className="titlebar">
            <div className="titlebar-title">
              <span style={{ fontSize: 16 }}>📝</span>
              <span>Balabolka Web — {tabs[activeTab]}{isDirty ? "*" : ""}</span>
            </div>
            <button className="titlebar-fs"
              onClick={() => !document.fullscreenElement ? document.documentElement.requestFullscreen().catch(() => { }) : document.exitFullscreen().catch(() => { })}>
              ⛶
            </button>
          </div>

          {/* Menu Bar */}
          <div className="menubar" onMouseDown={e => e.stopPropagation()}>
            {/* Arquivo */}
            <div style={{ position: "relative" }} onMouseDown={e => e.stopPropagation()}>
              <button className={"menu-btn" + (activeMenu === "arquivo" ? " active" : "")} onClick={e => toggleMenu("arquivo", e)}>Arquivo</button>
              {activeMenu === "arquivo" && (
                <div className="menu-dropdown">
                  <MenuItem label="Novo" shortcut="Ctrl+N" onClick={() => menuAction(handleNewDoc)} />
                  <MenuItem label="Abrir arquivo..." shortcut="Ctrl+O" onClick={() => menuAction(triggerFileInput)} />
                  <MenuItem label="Salvar texto como..." shortcut="Ctrl+S" onClick={() => menuAction(handleSaveText)} />
                  <div className="menu-sep" />
                  <MenuItem label="Salvar como Arquivo de Áudio..." shortcut="Alt+S" onClick={() => menuAction(handleSaveAudio)} />
                  <div className="menu-sep" />
                  <MenuItem label="Fechar Documento" onClick={() => menuAction(() => setCustomConfirm({
                    title: "Fechar documento", message: "Limpar o texto e fechar?",
                    onAccept: () => { setText(""); setIsDirty(false); handleStop(); }
                  }))} />
                </div>
              )}
            </div>
            {/* Editar */}
            <div style={{ position: "relative" }} onMouseDown={e => e.stopPropagation()}>
              <button className={"menu-btn" + (activeMenu === "editar" ? " active" : "")} onClick={e => toggleMenu("editar", e)}>Editar</button>
              {activeMenu === "editar" && (
                <div className="menu-dropdown" style={{ minWidth: 200 }}>
                  <MenuItem label="Copiar" shortcut="Ctrl+C" onClick={() => menuAction(handleCopy)} />
                  <MenuItem label="Colar" shortcut="Ctrl+V" onClick={() => menuAction(handlePaste)} />
                  <MenuItem label="Selecionar Tudo" shortcut="Ctrl+A" onClick={() => menuAction(handleSelectAll)} />
                  <div className="menu-sep" />
                  <MenuItem label="Localizar / Substituir..." shortcut="Ctrl+H" onClick={() => menuAction(() => setShowFindModal(true))} />
                  <div className="menu-sep" />
                  <MenuItem label="Limpar Texto" onClick={() => menuAction(() => { setText(""); setIsDirty(false); handleStop(); })} />
                </div>
              )}
            </div>
            {/* Fala */}
            <div style={{ position: "relative" }} onMouseDown={e => e.stopPropagation()}>
              <button className={"menu-btn" + (activeMenu === "fala" ? " active" : "")} onClick={e => toggleMenu("fala", e)}>Fala</button>
              {activeMenu === "fala" && (
                <div className="menu-dropdown">
                  <MenuItem label="▶ Ler em Voz Audível" shortcut="F5" onClick={() => menuAction(handlePlay)} />
                  <MenuItem label="⏸ Pausar" shortcut="F6" onClick={() => menuAction(handlePause)} />
                  <MenuItem label="⏹ Parar" shortcut="Esc" onClick={() => menuAction(handleStop)} />
                  <div className="menu-sep" />
                  <MenuItem label="🔊 Testar Voz Atual" onClick={() => menuAction(testVoice)} />
                </div>
              )}
            </div>
            {/* Exibir */}
            <div style={{ position: "relative" }} onMouseDown={e => e.stopPropagation()}>
              <button className={"menu-btn" + (activeMenu === "exibir" ? " active" : "")} onClick={e => toggleMenu("exibir", e)}>Exibir</button>
              {activeMenu === "exibir" && (
                <div className="menu-dropdown" style={{ minWidth: 200 }}>
                  <MenuItem label="Fontes e Cores..." onClick={() => menuAction(() => { setPendingColors({ ...colors }); setPendingFont({ ...fontSettings }); setShowFontModal(true); })} />
                  <MenuItem label="Tamanho dos Botões..." onClick={() => menuAction(() => setShowButtonSizeModal(true))} />
                </div>
              )}
            </div>
            {/* Ajuda */}
            <div style={{ position: "relative" }} onMouseDown={e => e.stopPropagation()}>
              <button className={"menu-btn" + (activeMenu === "ajuda" ? " active" : "")} onClick={e => toggleMenu("ajuda", e)}>Ajuda</button>
              {activeMenu === "ajuda" && (
                <div className="menu-dropdown" style={{ minWidth: 180 }}>
                  <MenuItem label="Sobre o Balabolka..." onClick={() => menuAction(() => setShowAboutModal(true))} />
                  <MenuItem label="Atalhos de Teclado" onClick={() => menuAction(() => setCustomAlert({
                    title: "Atalhos de Teclado",
                    message: "F5 — Ler texto\nF6 — Pausar\nEsc — Parar\nCtrl+N — Nova aba\nCtrl+O — Abrir arquivo\nCtrl+H — Localizar/Substituir\nCtrl+S — Salvar texto\nCtrl+A — Selecionar tudo"
                  }))} />
                </div>
              )}
            </div>
          </div>

          {/* Toolbar */}
          <div className="toolbar">
            <ToolBtn size={buttonSize} title="Novo (Ctrl+N)" onClick={handleNewDoc}><IconNew s={s} /></ToolBtn>
            <ToolBtn size={buttonSize} title="Abrir arquivo (Ctrl+O)" onClick={triggerFileInput}><IconOpen s={s} /></ToolBtn>
            <ToolBtn size={buttonSize} title="Salvar texto (Ctrl+S)" onClick={handleSaveText}><IconSave s={s} /></ToolBtn>
            <div className="toolbar-sep" />
            <ToolBtn size={buttonSize} title="Copiar" onClick={handleCopy}><IconCopy s={s} /></ToolBtn>
            <ToolBtn size={buttonSize} title="Colar" onClick={handlePaste}><IconPaste s={s} /></ToolBtn>
            <ToolBtn size={buttonSize} title="Selecionar Tudo" onClick={handleSelectAll}><IconSelectAll s={s} /></ToolBtn>
            <ToolBtn size={buttonSize} title="Desfazer (Ctrl+Z)" onClick={handleUndo}><IconUndo s={s} /></ToolBtn>
            <ToolBtn size={buttonSize} title="Refazer (Ctrl+Y)" onClick={handleRedo}><IconRedo s={s} /></ToolBtn>
            <div className="toolbar-sep" />
            <ToolBtn size={buttonSize} title="Localizar / Substituir (Ctrl+H)" onClick={() => setShowFindModal(true)}><IconFind s={s} /></ToolBtn>
            <div className="toolbar-sep" />
            <div style={{ position: "relative" }} onMouseDown={e => e.stopPropagation()}>
              <button
                title="Markdown"
                onClick={() => setShowMdDropdown(!showMdDropdown)}
                className={"toolbar-btn" + (isRenderedMd || showMdDropdown ? " active" : "")}
                style={{
                  width: buttonSize === "xs" ? "42px" : buttonSize === "sm" ? "48px" : buttonSize === "md" ? "56px" : buttonSize === "lg" ? "64px" : "80px",
                  height: { xs: "24px", sm: "28px", md: "36px", lg: "44px", xl: "56px" }[buttonSize] || "28px",
                  fontSize: "11px",
                  fontWeight: "bold",
                  display: "flex",
                  alignItems: "center",
                  justifyContent: "center",
                  gap: "2px"
                }}
              >
                <span>MD</span>
                <span style={{ fontSize: "9px" }}>▼</span>
              </button>
              {showMdDropdown && (
                <div className="menu-dropdown" style={{ minWidth: "160px", top: "100%", left: 0 }}>
                  <button
                    className="menu-item"
                    onClick={() => { setShowMdDropdown(false); setIsRenderedMd(!isRenderedMd); }}
                    style={{ fontWeight: isRenderedMd ? "bold" : "normal" }}
                  >
                    <span>{isRenderedMd ? "✓ Visualizar Renderizado" : "Visualizar Renderizado"}</span>
                  </button>
                  <button
                    className="menu-item"
                    onClick={() => { setShowMdDropdown(false); handleCleanMarkdown(); }}
                  >
                    <span>Limpar Marcações</span>
                  </button>
                  <button
                    className="menu-item"
                    onClick={() => { setShowMdDropdown(false); handleRestoreOriginal(); }}
                  >
                    <span>Restaurar Original</span>
                  </button>
                </div>
              )}
            </div>
            <div className="toolbar-sep" />
            <ToolBtn size={buttonSize} title="Ler (F5)" onClick={handlePlay} active={isPlaying}><IconPlay s={s} /></ToolBtn>
            <ToolBtn size={buttonSize} title="Pausar (F6)" onClick={handlePause} active={isPaused}><IconPause s={s} /></ToolBtn>
            <ToolBtn size={buttonSize} title="Parar (Esc)" onClick={handleStop}><IconStop s={s} /></ToolBtn>
            <div className="toolbar-sep" />
            <ToolBtn size={buttonSize} title="Testar Voz" onClick={testVoice}><IconVoice s={s} /></ToolBtn>
            <div className="toolbar-sep" />
            <ToolBtn size={buttonSize} title="Fontes e Cores" onClick={() => { setPendingColors({ ...colors }); setPendingFont({ ...fontSettings }); setShowFontModal(true); }}><IconFont s={s} /></ToolBtn>
            <ToolBtn size={buttonSize} title="Tamanho dos Botões" onClick={() => setShowButtonSizeModal(true)}><IconSettings s={s} /></ToolBtn>
          </div>

          {/* Voice Panel */}
          <div className="voice-panel">
            <div className="voice-row">
              <span className="voice-label">Voz:</span>
              {ttsSupported ? (
                <select className="xp-select" value={selectedVoice?.name || ""}
                  onChange={e => setSelectedVoice(voices.find(x => x.name === e.target.value) || null)}>
                  {!voices.length && <option>Carregando vozes...</option>}
                  {voices.map(v => <option key={v.name} value={v.name}>{v.name} [{v.lang}]</option>)}
                </select>
              ) : (
                <span style={{ fontSize: 12, color: "#dc2626", fontWeight: 600 }}>⚠️ Web Speech API não suportada</span>
              )}
              <button className="xp-btn" style={{ whiteSpace: "nowrap" }} onClick={testVoice} disabled={!ttsSupported}>🔊 Testar</button>
              <button
                className="play-stop-btn"
                style={isPlaying
                  ? { borderColor: "#ef4444", background: "#fee2e2", color: "#b91c1c" }
                  : { borderColor: "#16a34a", background: "#dcfce7", color: "#15803d" }}
                onClick={isPlaying ? handleStop : handlePlay}
                disabled={!ttsSupported}
              >
                {isPlaying ? "⏹ Parar" : isPaused ? "▶ Continuar" : "▶ Ler"}
              </button>
            </div>
            <div className="sliders-row">
              <SliderGroup label="Velocidade" min={0.1} max={10} step={0.1} value={rate} displayValue={`${rate.toFixed(1)}x`} onChange={setRate} />
              <SliderGroup label="Tonalidade" min={0} max={2} step={0.05} value={pitch} displayValue={pitch.toFixed(2)} onChange={setPitch} />
              <SliderGroup label="Volume" min={0} max={1} step={0.01} value={volume} displayValue={`${Math.round(volume * 100)}%`} onChange={setVolume} />
            </div>
          </div>

          {/* Tab Bar */}
          <div className="tabbar">
            {tabs.map((tab, i) => (
              <div key={i} className={"tab-item" + (i === activeTab ? " active" : "")} onClick={() => { if (renamingTabIndex === -1) switchTab(i); }}>
                {renamingTabIndex === i ? (
                  <input
                    type="text"
                    value={renameInput}
                    onChange={e => setRenameInput(e.target.value)}
                    onBlur={() => { if (renameInput.trim()) { const t = [...tabs]; t[i] = renameInput.trim(); setTabs(t); } setRenamingTabIndex(-1); setRenameInput(""); }}
                    onKeyDown={e => { if (e.key === "Enter") { if (renameInput.trim()) { const t = [...tabs]; t[i] = renameInput.trim(); setTabs(t); } setRenamingTabIndex(-1); setRenameInput(""); } if (e.key === "Escape") { setRenamingTabIndex(-1); setRenameInput(""); } }}
                    style={{ border: "1px solid #2563eb", padding: "2px 4px", fontSize: 12, outline: "none", width: 120 }}
                    autoFocus
                  />
                ) : (
                  <span style={{ overflow: "hidden", textOverflow: "ellipsis", cursor: "pointer", userSelect: "none" }}
                    onDoubleClick={() => { setRenamingTabIndex(i); setRenameInput(tab); }}>
                    {tab}{isDirty && i === activeTab ? "*" : ""}
                  </span>
                )}
                {tabs.length > 1 && renamingTabIndex !== i && (
                  <button className="tab-close" onClick={e => closeTab(i, e)}>×</button>
                )}
              </div>
            ))}
            <button className="tab-add" onClick={addTab}>+</button>
          </div>

          {/* Main Area */}
          <div className="main-area">
            <div className="editor-container">
              {isRenderedMd ? (
                /* Modo Markdown renderizado: apenas leitura */
                <div
                  ref={editorRef}
                  className="editor-area"
                  style={{
                    backgroundColor: colors.bgColor, color: colors.textColor,
                    fontFamily: fontSettings.family, fontSize: `${zoomedFontSize}px`,
                    fontWeight: fontSettings.bold ? "bold" : "normal",
                    fontStyle: fontSettings.italic ? "italic" : "normal",
                    lineHeight: fontSettings.lineHeight || 1.4,
                    whiteSpace: "normal", wordBreak: "break-word", userSelect: "text",
                    "--cursor-color": colors.textColor,
                  }}
                  dangerouslySetInnerHTML={{ __html: editorHtml }}
                  onClick={e => { handleCursorMove(); if (isPlaying || isPaused) handleStop(); }}
                />
              ) : (
                /* Modo texto: contentEditable single layer (Resolução definitiva do Ghosting) */
                <div
                  ref={editorRef}
                  className="editor-area"
                  contentEditable
                  suppressContentEditableWarning
                  onInput={handleInput}
                  onKeyDown={e => {
                    // Atalhos básicos dentro do editor
                    if (e.ctrlKey && e.key === 'a') { e.preventDefault(); handleSelectAll(); }
                  }}
                  onScroll={e => {
                    // Mantém track do scroll se necessário para outras lógicas
                  }}
                  onClick={e => {
                    handleCursorMove();
                    // Opcional: para leitura ao clicar se preferir comportamento antigo
                    // if (isPlaying || isPaused) handleStop();
                  }}
                  onKeyUp={handleCursorMove}
                  onSelect={handleCursorMove}
                  style={{
                    backgroundColor: colors.bgColor, color: colors.textColor,
                    fontFamily: fontSettings.family, fontSize: `${zoomedFontSize}px`,
                    fontWeight: fontSettings.bold ? "bold" : "normal",
                    fontStyle: fontSettings.italic ? "italic" : "normal",
                    lineHeight: fontSettings.lineHeight || 1.4,
                    outline: "none",
                    "--cursor-color": colors.textColor,
                  }}
                  dangerouslySetInnerHTML={{ __html: editorHtml }}
                />
              )}

              {!ttsSupported && (
                <div className="no-tts-overlay">
                  <div className="no-tts-box">
                    <div style={{ fontSize: 40, marginBottom: 12 }}>⚠️</div>
                    <h2 style={{ fontWeight: "bold", fontSize: 13, marginBottom: 8 }}>Web Speech API ausente</h2>
                    <p style={{ fontSize: 12, color: "#6b7280" }}>Use Chrome ou Edge para usufruir da síntese de áudio.</p>
                  </div>
                </div>
              )}
            </div>
          </div>

          {/* Status Bar */}
          <div className="statusbar">
            <StatusItem>{tabs[activeTab]}{isDirty ? "*" : ""}</StatusItem>
            <StatusItem>Linhas: {lineCount}</StatusItem>
            <StatusItem>Palavras: {wordCount}</StatusItem>
            <StatusItem>Chars: {charCount}</StatusItem>
            <StatusItem>Zoom: {zoom}%</StatusItem>
            <StatusItem>{totalWords > 0 ? `Cursor: ${cursorWordPos} de ${totalWords}` : ""}</StatusItem>
            <StatusItem>{estimatedTime > 0 ? `Tempo estimado: ${Math.floor(estimatedTime / 60)}m ${estimatedTime % 60}s` : ""}</StatusItem>
            <StatusItem>{remainingTime > 0 ? `Restante: ${Math.floor(remainingTime / 60)}m ${remainingTime % 60}s` : ""}</StatusItem>
            <StatusItem>{selectedVoice ? `🎙 ${selectedVoice.name}` : "Sem voz"}</StatusItem>
            <div className="statusbar-spacer" />
            <StatusItem>{isPlaying ? "▶ Lendo..." : isPaused ? "⏸ Pausado" : "⏹ Parado"}</StatusItem>
            <StatusItem>{selectedVoice?.lang || "—"}</StatusItem>
          </div>

          {/* ═══ MODALS ═══ */}

          {showButtonSizeModal && (
            <Modal title="Configurar Interface" onClose={() => setShowButtonSizeModal(false)} width="350px">
              <div style={{ padding: 16, display: "flex", flexDirection: "column", gap: 16 }}>
                <h3 style={{ fontSize: 12, fontWeight: "bold", color: "#374151" }}>Tamanho dos botões de controle:</h3>
                <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                  {[["xs", "Muito Pequeno"], ["sm", "Padrão (Pequeno)"], ["md", "Médio"], ["lg", "Grande"], ["xl", "Muito Grande"]].map(([sz, lbl]) => (
                    <label key={sz} style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 12, cursor: "pointer", userSelect: "none" }}>
                      <input type="radio" name="bsz" checked={buttonSize === sz} onChange={() => setButtonSize(sz)} />
                      <span>{lbl}</span>
                    </label>
                  ))}
                </div>
                <div style={{ display: "flex", justifyContent: "flex-end", paddingTop: 8, borderTop: "1px solid #d1d5db" }}>
                  <button className="xp-btn" onClick={() => setShowButtonSizeModal(false)}>OK</button>
                </div>
              </div>
            </Modal>
          )}

          {showFontModal && (
            <Modal title="Fontes e Cores" onClose={() => setShowFontModal(false)} width="480px">
              <div style={{ padding: 16, display: "flex", flexDirection: "column", gap: 16 }}>
                <div style={{
                  minHeight: 80, maxHeight: 200, overflow: "auto", flexWrap: "wrap",
                  border: "1px solid #808080", display: "flex", alignItems: "center",
                  justifyContent: "center", padding: "0 16px", gap: 8, borderRadius: 2,
                  backgroundColor: pendingColors.bgColor, color: pendingColors.textColor,
                  fontFamily: pendingFont.family, fontSize: `${pendingFont.size}px`,
                  fontWeight: pendingFont.bold ? "bold" : "normal", fontStyle: pendingFont.italic ? "italic" : "normal",
                  lineHeight: pendingFont.lineHeight || 1.4,
                }}>
                  <span>Texto normal </span>
                  <span style={{ color: pendingColors.readColor }}>Texto lido </span>
                  <span style={{ backgroundColor: pendingColors.highlightColor, color: "#fff", padding: "0 4px" }}>Palavra atual</span>
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                  <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                    <label style={{ fontSize: 12, fontWeight: "bold" }}>Fonte:</label>
                    <select className="xp-select" value={pendingFont.family}
                      onChange={e => setPendingFont({ ...pendingFont, family: e.target.value })}>
                      {FONT_FAMILIES.map(f => <option key={f} value={f} style={{ fontFamily: f }}>{f}</option>)}
                    </select>
                  </div>
                  <div style={{ display: "flex", flexDirection: "column", gap: 4, position: "relative" }}>
                    <label style={{ fontSize: 12, fontWeight: "bold" }}>Tamanho:</label>
                    <div style={{ display: "flex", border: "1px solid #7f9db9", background: "white", width: 80, height: 21, alignItems: "center" }}>
                      <input
                        type="text"
                        inputMode="numeric"
                        style={{ border: "none", outline: "none", width: "100%", padding: "2px 6px", fontSize: 12 }}
                        value={pendingFont.size}
                        onChange={e => {
                          const raw = e.target.value;
                          const val = parseInt(raw, 10);
                          if (!isNaN(val) && val >= 1) {
                            setPendingFont({ ...pendingFont, size: val });
                          } else if (raw === "" || raw === "0") {
                            setPendingFont({ ...pendingFont, size: raw });
                          }
                        }}
                        onBlur={e => {
                          const val = parseInt(e.target.value, 10);
                          if (!isNaN(val) && val >= 1) {
                            setPendingFont({ ...pendingFont, size: val });
                          } else {
                            setPendingFont({ ...pendingFont, size: 14 });
                          }
                        }}
                        onFocus={() => setShowSizeDropdown(true)}
                      />
                      <button
                        type="button"
                        onClick={(e) => { e.stopPropagation(); setShowSizeDropdown(prev => !prev); }}
                        style={{
                          border: "none",
                          borderLeft: "1px solid #7f9db9",
                          background: "linear-gradient(to bottom, #ffffff, #e0e0e0)",
                          cursor: "pointer",
                          height: "100%",
                          display: "flex",
                          alignItems: "center",
                          justifyContent: "center",
                          padding: "0 6px",
                          fontSize: "8px",
                          color: "#4b5563"
                        }}
                      >
                        ▼
                      </button>
                    </div>
                    {showSizeDropdown && (
                      <div
                        style={{
                          position: "absolute",
                          top: "100%",
                          left: 0,
                          width: 80,
                          maxHeight: 150,
                          overflowY: "auto",
                          background: "white",
                          border: "1px solid #7f9db9",
                          boxShadow: "2px 2px 6px rgba(0,0,0,0.2)",
                          zIndex: 1100,
                        }}
                        onMouseDown={e => { e.stopPropagation(); e.preventDefault(); }}
                      >
                        {[8, 9, 10, 11, 12, 14, 16, 18, 20, 22, 24, 26, 28, 36, 48, 72, 96, 144, 200].map(sz => (
                          <div
                            key={sz}
                            onClick={() => {
                              setPendingFont({ ...pendingFont, size: sz });
                              setShowSizeDropdown(false);
                            }}
                            style={{
                              padding: "3px 8px",
                              fontSize: 12,
                              cursor: "pointer",
                              background: pendingFont.size === sz ? "#cce8ff" : "transparent"
                            }}
                            onMouseEnter={e => e.target.style.background = "#cce8ff"}
                            onMouseLeave={e => e.target.style.background = pendingFont.size === sz ? "#cce8ff" : "transparent"}
                          >
                            {sz}
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                </div>
                <div style={{ display: "flex", gap: 24 }}>
                  <label style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12, cursor: "pointer", userSelect: "none" }}>
                    <input type="checkbox" checked={pendingFont.bold} onChange={e => setPendingFont({ ...pendingFont, bold: e.target.checked })} />
                    <strong>Negrito</strong>
                  </label>
                  <label style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12, cursor: "pointer", userSelect: "none" }}>
                    <input type="checkbox" checked={pendingFont.italic} onChange={e => setPendingFont({ ...pendingFont, italic: e.target.checked })} />
                    <em>Itálico</em>
                  </label>
                </div>
                {/* Controle de espaçamento entre linhas */}
                <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                  <label style={{ fontSize: 12, fontWeight: "bold" }}>Espaçamento entre linhas:</label>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <input
                      type="range"
                      min={1.0} max={3.0} step={0.1}
                      value={pendingFont.lineHeight || 1.4}
                      onChange={e => setPendingFont({ ...pendingFont, lineHeight: Number(e.target.value) })}
                      style={{ flex: 1 }}
                    />
                    <span style={{ fontSize: 12, fontWeight: "bold", fontFamily: "monospace", minWidth: 30 }}>
                      {(pendingFont.lineHeight || 1.4).toFixed(1)}
                    </span>
                  </div>
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                  <ColorRow label="Cor do texto" value={pendingColors.textColor} onChange={v => setPendingColors({ ...pendingColors, textColor: v })} />
                  <ColorRow label="Cor do fundo" value={pendingColors.bgColor} onChange={v => setPendingColors({ ...pendingColors, bgColor: v })} />
                  <ColorRow label="Texto já lido" value={pendingColors.readColor} onChange={v => setPendingColors({ ...pendingColors, readColor: v })} />
                  <ColorRow label="Destaque atual" value={pendingColors.highlightColor} onChange={v => setPendingColors({ ...pendingColors, highlightColor: v })} />
                </div>
                <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                  {[
                    ["🌙 Escuro", { textColor: "#ffffff", bgColor: "#000000", readColor: "#ff4444", selectionColor: "#3399ff", highlightColor: "#3399ff" }],
                    ["☀️ Claro", { textColor: "#000000", bgColor: "#ffffff", readColor: "#cc0000", selectionColor: "#0066ff", highlightColor: "#0066ff" }],
                    ["🖥️ VS Code", { textColor: "#d4d4d4", bgColor: "#1e1e1e", readColor: "#ff8c00", selectionColor: "#264f78", highlightColor: "#264f78" }],
                    ["📄 Solarizado", { textColor: "#3d2b00", bgColor: "#fdf6e3", readColor: "#859900", selectionColor: "#e0d7c7", highlightColor: "#b58900" }],
                  ].map(([lbl, theme]) => (
                    <button key={lbl} className="xp-btn cancel" style={{ fontSize: 12 }} onClick={() => setPendingColors(theme)}>{lbl}</button>
                  ))}
                </div>
                <div style={{ display: "flex", justifyContent: "flex-end", gap: 8, paddingTop: 8, borderTop: "1px solid #d1d5db" }}>
                  <button className="xp-btn" onClick={() => { setColors({ ...pendingColors }); setFontSettings({ ...pendingFont }); setShowFontModal(false); }}>OK</button>
                  <button className="xp-btn cancel" onClick={() => setShowFontModal(false)}>Cancelar</button>
                </div>
              </div>
            </Modal>
          )}

          {showFindModal && (
            <Modal title="Localizar / Substituir" onClose={() => setShowFindModal(false)} width="400px">
              <div style={{ padding: 16, display: "flex", flexDirection: "column", gap: 12 }}>
                <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                  <label style={{ fontSize: 12, fontWeight: "bold" }}>Localizar:</label>
                  <input className="xp-input" value={findText} onChange={e => setFindText(e.target.value)}
                    placeholder="Texto a localizar..." onKeyDown={e => e.key === "Enter" && handleFind()} autoFocus />
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                  <label style={{ fontSize: 12, fontWeight: "bold" }}>Substituir por:</label>
                  <input className="xp-input" value={replaceText} onChange={e => setReplaceText(e.target.value)} placeholder="Texto substituto..." />
                </div>
                <label style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 12, cursor: "pointer", userSelect: "none" }}>
                  <input type="checkbox" checked={findCase} onChange={e => setFindCase(e.target.checked)} />
                  Diferenciar maiúsculas/minúsculas
                </label>
                {findResult && (
                  <div style={{
                    fontSize: 12, padding: "6px 8px", borderRadius: 2,
                    background: findResult.includes("Nenhuma") ? "#fef2f2" : "#f0fdf4",
                    border: `1px solid ${findResult.includes("Nenhuma") ? "#fca5a5" : "#86efac"}`,
                    color: findResult.includes("Nenhuma") ? "#b91c1c" : "#15803d",
                  }}>{findResult}</div>
                )}
                {findOccurrences.length > 0 && (
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "4px 8px", fontSize: 12, background: "#f9fafb", border: "1px solid #e5e7eb", borderRadius: 2 }}>
                    <span>{findCurrentIdx + 1} de {findOccurrences.length}</span>
                    <div style={{ display: "flex", gap: 4 }}>
                      <button className="xp-btn" style={{ padding: "2px 8px", fontSize: 11 }} onClick={() => navigateOccurrence(-1)} title="Anterior (Shift+F3)">↑ Anterior</button>
                      <button className="xp-btn" style={{ padding: "2px 8px", fontSize: 11 }} onClick={() => navigateOccurrence(1)} title="Próximo (F3)">Próximo ↓</button>
                    </div>
                  </div>
                )}
                <div style={{ display: "flex", gap: 8, paddingTop: 4 }}>
                  <button className="xp-btn" onClick={handleFind}>Localizar</button>
                  <button className="xp-btn" onClick={handleReplace}>Substituir Tudo</button>
                  <button className="xp-btn cancel" onClick={() => { setShowFindModal(false); setFindResult(""); setFindOccurrences([]); setFindCurrentIdx(-1); }}>Fechar</button>
                </div>
              </div>
            </Modal>
          )}

          {showAboutModal && (
            <Modal title="Sobre o Balabolka" onClose={() => setShowAboutModal(false)} width="360px">
              <div style={{ padding: 24, display: "flex", flexDirection: "column", alignItems: "center", gap: 12, textAlign: "center" }}>
                <div style={{ fontSize: 48 }}>📝</div>
                <h2 style={{ fontWeight: "bold", fontSize: 13 }}>Balabolka — Leitor de Texto em Voz</h2>
                <p style={{ fontSize: 12, color: "#6b7280" }}>Versão Web (React + Web Speech API)</p>
                <div style={{
                  fontSize: 12, color: "#6b7280", textAlign: "left", background: "#f9fafb",
                  border: "1px solid #e5e7eb", padding: 12, borderRadius: 4, width: "100%"
                }}>
                  <p>• <strong>Vozes:</strong> Motor nativo do navegador</p>
                  <p>• <strong>Arrastar e Soltar:</strong> PDF, TXT, HTML, Markdown</p>
                  <p>• <strong>Tempo real:</strong> Altere velocidade durante a leitura!</p>
                </div>
                <button className="xp-btn" style={{ paddingLeft: 24, paddingRight: 24 }} onClick={() => setShowAboutModal(false)}>OK</button>
              </div>
            </Modal>
          )}

          {showSaveModal && (
            <Modal title="Salvar como Arquivo de Áudio" onClose={() => setShowSaveModal(false)} width="420px">
              <div style={{ padding: 16, display: "flex", flexDirection: "column", gap: 16 }}>
                <div style={{ fontSize: 12, color: "#374151", background: "#eff6ff", border: "1px solid #93c5fd", padding: 10, borderRadius: 2 }}>
                  🎙️ <strong>Como funciona:</strong> escolha <strong>"Esta guia"</strong> e marque <strong>"Compartilhar áudio da aba"</strong>.
                  O áudio será gravado em <strong>.webm</strong>.
                </div>
                {recordError && <div style={{ fontSize: 12, color: "#b91c1c", background: "#fef2f2", border: "1px solid #fca5a5", padding: 8, borderRadius: 2 }}>⚠️ {recordError}</div>}
                <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                  <label style={{ fontSize: 12, fontWeight: "bold" }}>Nome do arquivo:</label>
                  <div style={{ display: "flex", gap: 4 }}>
                    <input className="xp-input" value={saveFileName} onChange={e => setSaveFileName(e.target.value)} style={{ flex: 1 }} />
                    <span style={{ fontSize: 12, border: "1px solid #d1d5db", padding: "2px 8px", background: "#f3f4f6" }}>.webm</span>
                  </div>
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                  <label style={{ fontSize: 12, fontWeight: "bold" }}>Voz selecionada:</label>
                  <p style={{ fontSize: 12, color: "#6b7280", background: "#f9fafb", border: "1px solid #e5e7eb", padding: 8 }}>
                    {selectedVoice?.name || "Nenhuma"} [{selectedVoice?.lang || "—"}]
                  </p>
                </div>
                <div style={{ display: "flex", gap: 8, justifyContent: "flex-end", borderTop: "1px solid #d1d5db", paddingTop: 12 }}>
                  <button className="xp-btn" style={{ borderColor: "#16a34a", background: "#dcfce7", color: "#15803d", fontWeight: "bold" }} onClick={confirmSave}>
                    ⏺ Gravar e Salvar
                  </button>
                  <button className="xp-btn cancel" onClick={() => { setShowSaveModal(false); setRecordError(""); }}>Cancelar</button>
                </div>
              </div>
            </Modal>
          )}

          {customAlert && (
            <Modal title={customAlert.title} onClose={() => setCustomAlert(null)} width="340px">
              <div style={{ padding: 16, display: "flex", flexDirection: "column", gap: 12 }}>
                <div style={{ display: "flex", alignItems: "flex-start", gap: 12 }}>
                  <span style={{ fontSize: 28 }}>ℹ️</span>
                  <p style={{ fontSize: 12, color: "#374151", whiteSpace: "pre-wrap", flex: 1 }}>{customAlert.message}</p>
                </div>
                <div style={{ display: "flex", justifyContent: "flex-end", paddingTop: 8, borderTop: "1px solid #d1d5db" }}>
                  <button className="xp-btn" style={{ fontWeight: "bold", paddingLeft: 24, paddingRight: 24 }} onClick={() => setCustomAlert(null)}>OK</button>
                </div>
              </div>
            </Modal>
          )}

          {customConfirm && (
            <Modal title={customConfirm.title} onClose={() => setCustomConfirm(null)} width="360px">
              <div style={{ padding: 16, display: "flex", flexDirection: "column", gap: 12 }}>
                <div style={{ display: "flex", alignItems: "flex-start", gap: 12 }}>
                  <span style={{ fontSize: 28 }}>❓</span>
                  <p style={{ fontSize: 12, color: "#374151", whiteSpace: "pre-wrap", flex: 1 }}>{customConfirm.message}</p>
                </div>
                <div style={{ display: "flex", justifyContent: "flex-end", gap: 8, paddingTop: 8, borderTop: "1px solid #d1d5db" }}>
                  <button className="xp-btn" style={{ fontWeight: "bold" }} onClick={() => { customConfirm.onAccept(); setCustomConfirm(null); }}>Sim</button>
                  <button className="xp-btn cancel" onClick={() => setCustomConfirm(null)}>Não</button>
                </div>
              </div>
            </Modal>
          )}

          {isRecording && (
            <div className="recording-badge">
              <div className="rec-dot" />
              Gravando narração... fala em andamento
            </div>
          )}

          {showSavedNotif && (
            <div style={{
              position: "fixed", bottom: 40, right: 16, zIndex: 1100,
              background: "rgba(0, 0, 0, 0.7)", color: "white", fontSize: "11px",
              padding: "6px 12px", borderRadius: "4px", pointerEvents: "none",
              display: "flex", alignItems: "center", gap: "6px",
              boxShadow: "0 2px 8px rgba(0,0,0,0.3)"
            }}>
              <span>💾</span>
              <span>Salvo automaticamente</span>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>

</html>).render(<App />);
  </script>
</body>

</html>
