<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Balabolka Web</title>
  <style>
    :root {
      --text-color: #000000;
      --bg-color: #ffffff;
      --read-color: #cc0000;
      --highlight-color: #0066ff;
      --cursor-color: #00ff66;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #app { height: 100%; width: 100%; overflow: hidden; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #ece9d8; }

    .titlebar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 8px; height: 32px; flex-shrink: 0;
      background: linear-gradient(to bottom, #0058e6, #3a93ff);
    }
    .titlebar-title { display: flex; align-items: center; gap: 8px; color: white; font-weight: bold; font-size: 12px; }
    .titlebar-fs { width: 20px; height: 20px; font-size: 10px; color: white; border: 1px solid rgba(255,255,255,0.5); border-radius: 2px; display: flex; align-items: center; justify-content: center; background: transparent; cursor: pointer; }
    .titlebar-fs:hover { background: rgba(255,255,255,0.2); }

    .menubar { display: flex; background: #ece9d8; border-bottom: 1px solid #aca899; flex-shrink: 0; position: relative; z-index: 200; }
    .menu-btn { padding: 2px 8px; font-size: 12px; background: transparent; border: 1px solid transparent; cursor: pointer; }
    .menu-btn:hover, .menu-btn.active { background: #cce8ff; border-color: #99d1ff; }
    .menu-dropdown { position: absolute; top: 100%; left: 0; background: white; border: 1px solid #aca899; box-shadow: 2px 2px 6px rgba(0,0,0,0.3); min-width: 280px; z-index: 500; padding: 4px 0; }
    .menu-item { width: 100%; text-align: left; padding: 4px 16px; font-size: 12px; display: flex; justify-content: space-between; align-items: center; gap: 32px; background: transparent; border: none; cursor: pointer; white-space: nowrap; }
    .menu-item:hover { background: #cce8ff; }
    .menu-item .shortcut { color: #9ca3af; font-size: 10px; }
    .menu-sep { border-top: 1px solid #e5e7eb; margin: 3px 0; }

    .toolbar { display: flex; align-items: center; padding: 4px; background: #ece9d8; border-bottom: 1px solid #aca899; flex-shrink: 0; flex-wrap: wrap; gap: 2px; }
    .toolbar-btn { display: flex; align-items: center; justify-content: center; border: 1px solid transparent; cursor: pointer; background: transparent; transition: border-color 0.1s, background 0.1s; width: 28px; height: 28px; font-size: 14px; line-height: 1; }
    .toolbar-btn:hover, .toolbar-btn.active { border-color: #99d1ff; background: #cce8ff; }
    .toolbar-sep { width: 1px; height: 20px; background: #aca899; box-shadow: 1px 0 0 white; margin: 0 4px; }

    .voice-panel { display: flex; flex-direction: column; gap: 6px; padding: 6px 8px; background: #ece9d8; border-bottom: 1px solid #aca899; flex-shrink: 0; }
    .voice-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .voice-label { font-size: 12px; font-weight: 600; color: #374151; white-space: nowrap; }
    .sliders-row { display: flex; gap: 16px; padding: 0 4px; flex-wrap: wrap; }
    .slider-group { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 140px; }
    .slider-label { font-size: 10px; color: #374151; white-space: nowrap; width: 64px; font-weight: 600; }
    .slider-value { font-size: 10px; color: #374151; width: 40px; text-align: right; font-family: monospace; font-weight: bold; }

    .voice-picker-wrap { position: relative; min-width: 220px; flex: 1; max-width: 360px; }
    .voice-picker-display { font-size: 12px; border: 1px solid #7f9db9; padding: 3px 6px; background: white; cursor: pointer; display: flex; align-items: center; justify-content: space-between; user-select: none; }
    .voice-picker-display:hover { background: #f0f8ff; }
    .voice-picker-dropdown {
      position: absolute; top: 100%; left: 0; right: 0;
      background: white; border: 1px solid #aca899;
      box-shadow: 2px 2px 6px rgba(0,0,0,0.3);
      z-index: 600;
      max-height: 260px;
      overflow: hidden;
    }
    .voice-picker-search { padding: 4px 6px; border-bottom: 1px solid #e5e7eb; }
    .voice-picker-search input { width: 100%; font-size: 12px; border: 1px solid #7f9db9; padding: 3px 6px; outline: none; }
    .voice-picker-list { max-height: 220px; overflow-y: auto; }
    .voice-group-label { font-size: 10px; font-weight: bold; color: #4b5563; background: #f3f4f6; padding: 3px 8px; border-top: 1px solid #e5e7eb; text-transform: uppercase; letter-spacing: 0.5px; }
    .voice-option { padding: 4px 10px; font-size: 12px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
    .voice-option:hover, .voice-option.selected { background: #cce8ff; }
    .voice-option .lang-tag { font-size: 10px; color: #6b7280; background: #f3f4f6; padding: 1px 4px; border-radius: 2px; }
    .voice-no-results { padding: 8px; font-size: 12px; color: #9ca3af; text-align: center; }

    .tabbar { display: flex; align-items: flex-end; background: #d4d0c8; border-bottom: 1px solid #aca899; flex-shrink: 0; padding: 4px 4px 0; gap: 2px; overflow-x: auto; }
    .tab-item { display: flex; align-items: center; gap: 4px; padding: 2px 12px; font-size: 12px; cursor: pointer; border: 1px solid #aca899; border-bottom: none; max-width: 140px; overflow: hidden; white-space: nowrap; user-select: none; }
    .tab-item.active { background: #ece9d8; font-weight: 600; position: relative; z-index: 10; }
    .tab-item:not(.active) { background: #c0c0c0; color: #4b5563; }
    .tab-item:not(.active):hover { background: #d0d0d0; }
    .tab-close { color: #9ca3af; font-weight: bold; cursor: pointer; margin-left: 2px; background: none; border: none; font-size: 13px; line-height: 1; padding: 0; }
    .tab-close:hover { color: #ef4444; }
    .tab-add { padding: 2px 8px; font-size: 12px; border: 1px solid #aca899; background: #c0c0c0; cursor: pointer; font-weight: bold; }
    .tab-add:hover { background: #d0d0d0; }
    .tab-input { border: 1px solid #2563eb; padding: 2px 4px; font-size: 12px; outline: none; width: 100px; }

    .main-area { display: flex; flex: 1; position: relative; overflow: hidden; }
    .editor-container { flex: 1; position: relative; overflow: hidden; }
    .editor-area { width: 100%; height: 100%; padding: 12px; resize: none; outline: none; border: none; overflow-y: auto; overflow-x: hidden; scroll-behavior: smooth; touch-action: pan-y; overscroll-behavior: auto; white-space: pre-wrap; word-break: break-word; }

    .token { transition: background-color 0.1s, color 0.1s; border-radius: 2px; }
    .token.read { color: var(--read-color); }
    .token.active { background-color: var(--highlight-color); color: #fff; font-weight: bold; padding: 0 2px; position: relative; }
    .token.active::after { content: ""; position: absolute; left: -1px; top: 0; bottom: 0; width: 2px; background-color: var(--cursor-color); animation: karaoke-blink 1s steps(1) infinite; pointer-events: none; }
    @keyframes karaoke-blink { 50% { opacity: 0; } }

    .statusbar { display: flex; align-items: center; height: 24px; padding: 0 4px; background: #ece9d8; border-top: 1px solid #aca899; flex-shrink: 0; gap: 8px; font-size: 10px; }
    .status-item { border: 1px solid #aca899; border-right-color: white; border-bottom-color: white; padding: 1px 4px; background: #f0f0f0; white-space: nowrap; }
    .statusbar-spacer { flex: 1; }

    .modal-overlay { position: fixed; inset: 0; z-index: 1000; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.3); }
    .modal-box { background: #ece9d8; display: flex; flex-direction: column; box-shadow: 4px 4px 16px rgba(0,0,0,0.5); border: 2px solid white; border-right-color: #404040; border-bottom-color: #404040; max-height: 90vh; overflow-y: auto; }
    .modal-titlebar { display: flex; align-items: center; justify-content: space-between; padding: 5px 10px; font-weight: bold; font-size: 12px; color: white; flex-shrink: 0; background: linear-gradient(to right, #0058e6, #3a93ff); user-select: none; cursor: move; }
    .modal-close { width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; background: transparent; border: none; color: white; cursor: pointer; font-size: 11px; border-radius: 2px; }
    .modal-close:hover { background: #ef4444; }
    .xp-btn { font-size: 12px; padding: 2px 16px; cursor: pointer; border: 1px solid #003c74; background: linear-gradient(to bottom, #ffffff, #e0e0e0); }
    .xp-btn:hover { background: linear-gradient(to bottom, #ffffff, #cccccc); }
    .xp-btn.cancel { border-color: #9ca3af; }
    .xp-input { font-size: 12px; border: 1px solid #7f9db9; padding: 2px 6px; width: 100%; outline: none; background: white; }
    .xp-select { font-size: 12px; border: 1px solid #7f9db9; padding: 2px 4px; outline: none; background: white; width: 100%; }

    .drag-overlay { position: absolute; inset: 0; background: rgba(0,88,230,0.3); border: 4px dashed #0058e6; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
    .drag-box { background: #ece9d8; padding: 32px; border: 2px solid white; box-shadow: 0 8px 32px rgba(0,0,0,0.3); display: flex; flex-direction: column; align-items: center; gap: 12px; }

    .no-tts-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.8); z-index: 30; }
    .no-tts-box { background: #ece9d8; padding: 24px; border: 2px solid #808080; max-width: 320px; text-align: center; }

    .play-stop-btn { font-size: 12px; padding: 2px 12px; border-radius: 0; cursor: pointer; font-weight: bold; border: 1px solid; }
    .play-stop-btn.play { border-color: #16a34a; background: #dcfce7; color: #15803d; }
    .play-stop-btn.stop { border-color: #ef4444; background: #fee2e2; color: #b91c1c; }

    .color-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .color-row label { font-size: 12px; color: #374151; flex: 1; }
    .color-preview { width: 24px; height: 24px; border: 1px solid #9ca3af; border-radius: 2px; }

    .notif { position: fixed; bottom: 40px; right: 16px; z-index: 1100; background: rgba(0,0,0,0.7); color: white; font-size: 11px; padding: 6px 12px; border-radius: 4px; pointer-events: none; display: flex; align-items: center; gap: 6px; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }

    ::-webkit-scrollbar { width: 12px; height: 12px; }
    ::-webkit-scrollbar-track { background: #f0f0f0; }
    ::-webkit-scrollbar-thumb { background: #aca899; border: 2px solid #f0f0f0; }
    ::-webkit-scrollbar-thumb:hover { background: #888; }
  </style>
</head>
<body>
  <div id="app" style="display:flex; flex-direction:column; height:100vh; width:100vw; overflow:hidden;">
    <div class="titlebar">
      <div class="titlebar-title">
        <span style="font-size:16px">📝</span>
        <span id="window-title">Balabolka Web</span>
      </div>
      <button class="titlebar-fs" id="btn-fs">⛶</button>
    </div>

    <div class="menubar" id="menubar">
      <div style="position:relative;"><button class="menu-btn" data-menu="arquivo">Arquivo</button></div>
      <div style="position:relative;"><button class="menu-btn" data-menu="editar">Editar</button></div>
      <div style="position:relative;"><button class="menu-btn" data-menu="fala">Fala</button></div>
      <div style="position:relative;"><button class="menu-btn" data-menu="exibir">Exibir</button></div>
      <div style="position:relative;"><button class="menu-btn" data-menu="ajuda">Ajuda</button></div>
    </div>

    <div class="toolbar" id="toolbar">
      <button class="toolbar-btn" id="tb-new" title="Novo (Ctrl+N)">🆕</button>
      <button class="toolbar-btn" id="tb-open" title="Abrir (Ctrl+O)">📂</button>
      <button class="toolbar-btn" id="tb-save" title="Salvar texto (Ctrl+S)">💾</button>
      <div class="toolbar-sep"></div>
      <button class="toolbar-btn" id="tb-copy" title="Copiar">📋</button>
      <button class="toolbar-btn" id="tb-paste" title="Colar">📄</button>
      <button class="toolbar-btn" id="tb-select-all" title="Selecionar tudo">🔲</button>
      <button class="toolbar-btn" id="tb-undo" title="Desfazer (Ctrl+Z)">↩️</button>
      <button class="toolbar-btn" id="tb-redo" title="Refazer (Ctrl+Y)">↪️</button>
      <div class="toolbar-sep"></div>
      <button class="toolbar-btn" id="tb-find" title="Localizar/Substituir (Ctrl+H)">🔍</button>
      <div class="toolbar-sep"></div>
      <button class="toolbar-btn" id="tb-md" title="Markdown">MD</button>
      <div class="toolbar-sep"></div>
      <button class="toolbar-btn" id="tb-play" title="Ler (F5)">▶️</button>
      <button class="toolbar-btn" id="tb-pause" title="Pausar (F6)">⏸️</button>
      <button class="toolbar-btn" id="tb-stop" title="Parar (Esc)">⏹️</button>
      <div class="toolbar-sep"></div>
      <button class="toolbar-btn" id="tb-test" title="Testar voz">🔊</button>
      <div class="toolbar-sep"></div>
      <button class="toolbar-btn" id="tb-font" title="Fontes e Cores">🔤</button>
      <button class="toolbar-btn" id="tb-size" title="Tamanho dos botões">⚙️</button>
      <div class="toolbar-sep"></div>
      <button class="toolbar-btn" id="tb-close" title="Fechar documento">✕</button>
      <button class="toolbar-btn" id="tb-close-all" title="Fechar todos">🗑️</button>
      <button class="toolbar-btn" id="tb-close-others" title="Manter apenas esta guia">📌</button>
    </div>

    <div class="voice-panel">
      <div class="voice-row">
        <span class="voice-label">Voz:</span>
        <div class="voice-picker-wrap" id="voice-picker-wrap">
          <div class="voice-picker-display" id="voice-picker-display">Selecione uma voz...</div>
          <div class="voice-picker-dropdown" id="voice-picker-dropdown" style="display:none;">
            <div class="voice-picker-search"><input type="text" id="voice-search-input" placeholder="Pesquisar voz..."></div>
            <div class="voice-picker-list" id="voice-picker-list"></div>
          </div>
        </div>
        <button class="xp-btn" id="btn-test-voice" style="white-space:nowrap">🔊 Testar</button>
        <button class="play-stop-btn play" id="btn-play-big">▶ Ler</button>
      </div>
      <div class="sliders-row">
        <div class="slider-group">
          <span class="slider-label">Velocidade:</span>
          <input type="range" id="range-rate" min="0.1" max="10" step="0.1" value="1" style="flex:1; height:4px; cursor:pointer;">
          <span class="slider-value" id="val-rate">1.0x</span>
        </div>
        <div class="slider-group">
          <span class="slider-label">Tonalidade:</span>
          <input type="range" id="range-pitch" min="0" max="2" step="0.05" value="1" style="flex:1; height:4px; cursor:pointer;">
          <span class="slider-value" id="val-pitch">1.00</span>
        </div>
        <div class="slider-group">
          <span class="slider-label">Volume:</span>
          <input type="range" id="range-volume" min="0" max="1" step="0.01" value="1" style="flex:1; height:4px; cursor:pointer;">
          <span class="slider-value" id="val-volume">100%</span>
        </div>
      </div>
    </div>

    <div class="tabbar" id="tabbar"></div>

    <div class="main-area" id="drop-zone">
      <div class="editor-container">
        <div id="editor" class="editor-area" contenteditable="true" style="background:#ffffff; color:#000000; font-family:'Courier New', monospace; font-size:14px; line-height:1.4;"></div>
        <div id="md-viewer" class="editor-area" style="display:none; background:#ffffff; color:#000000; font-family:'Segoe UI', sans-serif; font-size:14px; line-height:1.4; white-space:normal;"></div>
        <div id="no-tts" class="no-tts-overlay" style="display:none;">
          <div class="no-tts-box">
            <div style="font-size:40px; margin-bottom:12px">⚠️</div>
            <h2 style="font-weight:bold; font-size:13px; margin-bottom:8px">Web Speech API ausente</h2>
            <p style="font-size:12px; color:#6b7280">Use Chrome ou Edge para usufruir da síntese de áudio.</p>
          </div>
        </div>
      </div>
    </div>

    <div class="statusbar" id="statusbar">
      <span class="status-item" id="st-doc">Documento1</span>
      <span class="status-item" id="st-lines">Linhas: 1</span>
      <span class="status-item" id="st-words">Palavras: 0</span>
      <span class="status-item" id="st-chars">Chars: 0</span>
      <span class="status-item" id="st-zoom">Zoom: 100%</span>
      <span class="status-item" id="st-cursor">Cursor: 0 de 0</span>
      <span class="status-item" id="st-time">Tempo estimado: 0m 0s</span>
      <span class="status-item" id="st-voice">Sem voz</span>
      <div class="statusbar-spacer"></div>
      <span class="status-item" id="st-status">⏹ Parado</span>
      <span class="status-item" id="st-lang">—</span>
    </div>
  </div>

  <input type="file" id="file-input" style="display:none" multiple accept=".txt,.md,.html,.htm">
  <div id="modals"></div>

  <script>
(function(){
  'use strict';

  // === Storage helpers ===
  const LS = {
    get: (k, def) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : def; } catch(e) { return def; } },
    set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {} }
  };

  // === State ===
  const state = {
    tabs: LS.get('balabolka_tabs', ['Documento1']),
    texts: LS.get('balabolka_texts', ['']),
    activeTab: LS.get('balabolka_activeTab', 0),
    rate: LS.get('balabolka_rate', 1.0),
    pitch: LS.get('balabolka_pitch', 1.0),
    volume: LS.get('balabolka_volume', 1.0),
    selectedVoiceName: LS.get('balabolka_voice', null),
    colors: LS.get('balabolka_colors', { text: '#000000', bg: '#ffffff', read: '#cc0000', highlight: '#0066ff' }),
    font: LS.get('balabolka_font', { family: 'Courier New', size: 14, bold: false, italic: false, lineHeight: 1.4 }),
    zoom: LS.get('balabolka_zoom', 100),
    buttonSize: LS.get('balabolka_buttonSize', 'sm'),
    isMd: false,
    voices: [],
    ttsSupported: !!window.speechSynthesis,
    isPlaying: false,
    isPaused: false,
    isDirty: false,
    isRecording: false,
    renaming: -1,
    findText: '',
    replaceText: '',
    findCase: false,
    activeMenu: null,
    dragging: false,
    readingTokens: [],
    readingStartIdx: 0,
    currentTokenIdx: -1,
    originalMdTexts: LS.get('balabolka_originalMdTexts', []),
    isRenderedMd: false,
    isInReadingView: false,   // true quando o editor está mostrando tokens coloridos após stop
    lastReadTokenIdx: -1,     // índice do token onde a leitura parou
    // === NOVO: controle do keep-alive timer ===
    keepAliveTimer: null
  };

  // === DOM refs ===
  const $ = id => document.getElementById(id);
  const editor = $('editor');
  // Clique num token em modo leitura parada → muda ponto de retomada
editor.addEventListener('click', function(e) {
  if (!state.isInReadingView) return; // Só age se estiver em modo de leitura

  const token = e.target.closest('.token');
  if (!token) {
    // Clicou fora de um token no modo de leitura, não faz nada
    return;
  }

  const idx = parseInt(token.dataset.idx);
  if (isNaN(idx)) return;

  // Remove .active do token anterior e adiciona .read se for antes do novo token
  const currentActive = editor.querySelector('.token.active');
  if (currentActive) {
    currentActive.classList.remove('active');
    const prevIdx = parseInt(currentActive.dataset.idx);
    if (prevIdx < idx) {
      currentActive.classList.add('read');
    }
  }

  // Marca o token clicado como ativo, remove 'read' se houver
  token.classList.remove('read');
  token.classList.add('active');

  state.lastReadTokenIdx = idx;
  updateStatus();
});

// Adiciona um listener para duplo clique para sair do modo de leitura e editar
editor.addEventListener('dblclick', function(e) {
  if (state.isInReadingView) {
    clearReadingView();
    // Restaurar cursor para a posição original (ou final)
    const textLength = editor.innerText.length;
    if (textLength > 0) {
      const range = document.createRange();
      const sel = window.getSelection();
      range.setStart(editor, editor.childNodes.length); // Coloca o cursor no final
      range.collapse(true);
      sel.removeAllRanges();
      sel.addRange(range);
    }
    editor.focus();
  }
});

editor.addEventListener('input', function() {
  // Somente limpa a visão de leitura quando há uma edição real no editor
  if (state.isInReadingView) {
    clearReadingView();
  }
  state.texts[state.activeTab] = editor.innerText;
  state.isDirty = true;
  saveTabs();
  updateStatus();
  showSavedNotif();
});

// Detecta digitação no modo leitura (contentEditable=false) e limpa o realce para permitir edição
editor.addEventListener('keydown', function(e) {
  if (!state.isInReadingView) return;
  
  // Ignora teclas de navegação/funcionais (setas, Home, End, PageUp/Down, Tab, Escape, etc.)
  const navigationKeys = [
    'ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown',
    'Home', 'End', 'PageUp', 'PageDown',
    'Tab', 'Escape', 'Enter', 'Backspace', 'Delete',
    'Control', 'Alt', 'Shift', 'Meta', 'CapsLock',
    'F1', 'F2', 'F3', 'F4', 'F5', 'F6', 'F7', 'F8', 'F9', 'F10', 'F11', 'F12'
  ];
  
  // Se for tecla de navegação/funcional, não limpa o realce (permite seleção/navegação)
  if (navigationKeys.includes(e.key)) return;
  
  // Se for combinação com Ctrl/Alt/Meta (atalhos), não limpa
  if (e.ctrlKey || e.altKey || e.metaKey) return;
  
  // Se chegou aqui, é uma tecla de caractere imprimível → limpa realce para editar
  clearReadingView();
});
  const mdViewer = $('md-viewer');
  const tabbar = $('tabbar');
  const fileInput = $('file-input');
  const modals = $('modals');
  const dropZone = $('drop-zone');
  const root = document.documentElement;
  const voicePickerDisplay = $('voice-picker-display');
  const voicePickerDropdown = $('voice-picker-dropdown');
  const voicePickerList = $('voice-picker-list');
  const voiceSearchInput = $('voice-search-input');

  function setCSSColors() {
    root.style.setProperty('--text-color', state.colors.text);
    root.style.setProperty('--bg-color', state.colors.bg);
    root.style.setProperty('--read-color', state.colors.read);
    root.style.setProperty('--highlight-color', state.colors.highlight);
    root.style.setProperty('--cursor-color', '#00ff66');

  setCSSColors();

  // === Clipboard: plain text only ===
  editor.addEventListener('copy', e => {
    e.preventDefault();

    e.clipboardData.setData('text/plain', text);

  editor.addEventListener('cut', e => {
    e.preventDefault();
    const text = window.getSelection().toString();
    e.clipboardData.setData('text/plain', text);
    document.execCommand('delete');
  });
  editor.addEventListener('paste', e => {
    e.preventDefault();
    const text = e.clipboardData.getData('text/plain') || e.clipboardData.getData('text/html');
    const plain = text ? text.replace(/<[^>]*>/g, '') : '';
    document.execCommand('insertText', false, plain);

  // === Markdown ===
  function stripMarkdown(text) {
    if (!text) return '';
    return text
      .replace(/```[\s\S]*?```/g, '')
      .replace(/`([^`]+)`/g, '$1')
      .replace(/!\[[^\]]*\]\([^)]+\)/g, '')
      .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')
      .replace(/\*\*([^*]+)\*\*/g, '$1')
      .replace(/__([^_]+)__/g, '$1')
      .replace(/\*([^*]+)\*/g, '$1')
      .replace(/_([^_]+)_/g, '$1')
      .replace(/~~([^~]+)~~/g, '$1')
      .replace(/^#{1,6}\s+/gm, '')
      .replace(/^>\s*/gm, '')
      .replace(/^(---|___|\*\*\*)\s*$/gm, '')
      .replace(/^\s*[-*+]\s+/gm, '')
      .replace(/^\s*\d+\.\s+/gm, '')
      .replace(/\|/g, ' ');
  }

  function renderMarkdown(md) {
    if (!md) return '';
    let html = escapeHtml(md)
      .replace(/```([\s\S]*?)```/g, '<pre style="background:rgba(0,0,0,0.05); border:1px solid #ccc; padding:8px; overflow:auto; font-family:monospace; font-size:0.9em;">$1</pre>')
      .replace(/`([^`]+)`/g, '<code style="background:rgba(0,0,0,0.05); border:1px solid #ccc; padding:2px 4px; font-family:monospace; font-size:0.9em;">$1</code>')
      .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
      .replace(/__([^_]+)__/g, '<strong>$1</strong>')
      .replace(/\*([^*]+)\*/g, '<em>$1</em>')
      .replace(/_([^_]+)_/g, '<em>$1</em>')
      .replace(/~~([^~]+)~~/g, '<del>$1</del>')
      .replace(/!\[([^\]]*)\]\([^)]+\)/g, '<span style="display:inline-flex; align-items:center; gap:4px; border:1px solid #ccc; padding:2px 6px; background:rgba(0,0,0,0.05); border-radius:4px; font-size:0.9em;">🖼️ $1</span>')
      .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" style="color:#2563eb; text-decoration:underline;">$1</a>')
      .replace(/^#{1}\s+(.*)$/gm, '<h1 style="font-size:1.8em; margin:12px 0 6px; font-weight:bold; line-height:1.2;">$1</h1>')
      .replace(/^#{2}\s+(.*)$/gm, '<h2 style="font-size:1.5em; margin:12px 0 6px; font-weight:bold; line-height:1.2;">$1</h2>')
      .replace(/^#{3}\s+(.*)$/gm, '<h3 style="font-size:1.3em; margin:12px 0 6px; font-weight:bold; line-height:1.2;">$1</h3>')
      .replace(/^#{4}\s+(.*)$/gm, '<h4 style="font-size:1.1em; margin:12px 0 6px; font-weight:bold; line-height:1.2;">$1</h4>')
      .replace(/^#{5}\s+(.*)$/gm, '<h5 style="font-size:1.0em; margin:12px 0 6px; font-weight:bold; line-height:1.2;">$1</h5>')
      .replace(/^#{6}\s+(.*)$/gm, '<h6 style="font-size:0.9em; margin:12px 0 6px; font-weight:bold; line-height:1.2;">$1</h6>')
      .replace(/^&gt;\s+(.*)$/gm, '<blockquote style="border-left:4px solid #2563eb; padding-left:12px; margin:8px 0; font-style:italic; opacity:0.85;">$1</blockquote>')
      .replace(/^\s*[-*+]\s+(.*)$/gm, '<li style="margin:4px 0;">$1</li>')
      .replace(/^(\d+)\.\s+(.*)$/gm, '<li style="margin:4px 0;">$2</li>')
      .replace(/^(---|___|\*\*\*)\s*$/gm, '<hr style="margin:16px 0; border:0; border-top:1px solid #ccc;">')
      .replace(/\n/g, '<br>');
    return html;
  }

  function escapeHtml(t) {
    return (t || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function tokenize(text) {
    return text.split(/(\s+)/);
  }

  // =====================================================================
  // === NOVO: Divide texto em chunks em pontos naturais de pontuação  ===
  // =====================================================================
  function splitTextIntoChunks(text, maxLen) {
    maxLen = maxLen || 3000;
    const chunks = [];
    let remaining = text;

    while (remaining.length > 0) {
      if (remaining.length <= maxLen) {
        chunks.push(remaining);
        break;
      }

      // Procura o último ponto de quebra natural dentro do limite
      let cutAt = -1;
      const breakChars = ['.', '!', '?', ';', '\n', ','];
      for (let b = 0; b < breakChars.length; b++) {
        const idx = remaining.lastIndexOf(breakChars[b], maxLen);
        if (idx > cutAt) cutAt = idx;
      }

      // Se não encontrou ponto natural, procura espaço
      if (cutAt <= 0) {
        cutAt = remaining.lastIndexOf(' ', maxLen);
      }

      // Se ainda não encontrou, corta no limite
      if (cutAt <= 0) {
        cutAt = maxLen;
      }

      chunks.push(remaining.substring(0, cutAt + 1));
      remaining = remaining.substring(cutAt + 1);
    }

    return chunks;
  }

  // =====================================================================
  // === NOVO: Para e limpa o keep-alive timer com segurança           ===
  // =====================================================================
  function clearKeepAlive() {
    if (state.keepAliveTimer) {
      clearInterval(state.keepAliveTimer);
      state.keepAliveTimer = null;
    }
  }

  // =====================================================================
  // === NOVO: Inicia o keep-alive timer para evitar cancelamento      ===
  //           automático do Chrome/Edge em textos longos              ===
  // =====================================================================
  function startKeepAlive() {
    clearKeepAlive();
    state.keepAliveTimer = setInterval(function() {
      if (window.speechSynthesis.speaking && !window.speechSynthesis.paused) {
        window.speechSynthesis.pause();
        window.speechSynthesis.resume();
      }
    }, 5000);
  }

  // === TTS ===
  function getPlainText() {
    if (state.isRenderedMd) return stripMarkdown(state.texts[state.activeTab] || '');
    // Lê diretamente do editor, que é a verdadeira fonte do momento, para evitar
    // que o texto do state fique dessincronizado (ex: setado via Playwright)
    const editorText = editor.innerText || '';
    return editorText || state.texts[state.activeTab] || '';
  }

 function getCursorOffset() {
  var sel = window.getSelection();
  if (!sel || !sel.rangeCount) return 0;
  var range = sel.getRangeAt(0);
  if (!editor.contains(range.startContainer)) return 0;

  var targetNode   = range.startContainer;
  var targetOffset = range.startOffset;
  var pos          = 0;
  var found        = false;

  var BLOCK_TAGS = {
    div: 1, p: 1, li: 1,
    h1: 1, h2: 1, h3: 1, h4: 1, h5: 1, h6: 1,
    blockquote: 1, pre: 1, tr: 1
  };

  function walk(node, isFirst) {
    if (found) return;

    if (node.nodeType === 3) {
      // Nó de texto puro
      if (node === targetNode) {
        pos += targetOffset;
        found = true;
        return;
      }
      pos += node.length;

    } else if (node.nodeType === 1) {
      var tag = node.tagName.toLowerCase();

      if (tag === 'br') {
        // <br> vale 1 caractere \n no innerText
        if (node === targetNode) { found = true; return; }
        pos += 1;
        return;
      }

      // Elemento de bloco não-primeiro contribui com 1 \n implícito,
      // exatamente como o innerText enxerga
      if (!isFirst && BLOCK_TAGS[tag]) {
        if (node === targetNode) { found = true; return; }
        pos += 1;
        if (found) return;
      }

      var firstChild = true;
      for (var i = 0; i < node.childNodes.length; i++) {
        walk(node.childNodes[i], firstChild);
        firstChild = false;
        if (found) return;
      }
    }
  }

  var firstChild = true;
  for (var i = 0; i < editor.childNodes.length; i++) {
    walk(editor.childNodes[i], firstChild);
    firstChild = false;
    if (found) break;
  }

  return pos;
}


  function findStartToken(tokens, charOffset) {
    let acc = 0;
    for (let i = 0; i < tokens.length; i++) {
      if (acc + tokens[i].length > charOffset) return i;
      acc += tokens[i].length;
    }
    return 0;
  }
  
  // Encontra o primeiro token não-whitespace a partir de um dado índice
  // Usado para pular quebras de linha, espaços etc. quando o cursor está em linha vazia
  function skipWhitespaceTokens(tokens, startIdx) {
    var wsRegex = /^\s+$/;
    for (var i = startIdx; i < tokens.length; i++) {
      if (!wsRegex.test(tokens[i])) return i;
    }
    // Se todos os tokens a partir de startIdx são whitespace, retorna o primeiro token não-ws ou 0
    for (var i = 0; i < tokens.length; i++) {
      if (!wsRegex.test(tokens[i])) return i;
    }
    return 0;
  }

  function renderReadingMode(tokens, startIdx) {
    // Salva a posição de scroll antes de modificar o innerHTML
    const savedScrollTop = editor.scrollTop;
    editor.contentEditable = 'false';
    editor.style.whiteSpace = 'pre-wrap';
    editor.innerHTML = tokens.map((tok, i) => {
      const cls = ['token'];
      // Marca tokens ANTES do ponto de início como já lidos (histórico de leitura anterior)
      if (i < startIdx) cls.push('read');
      // NÃO marca startIdx como .active aqui — o primeiro onboundary vai fazer isso
      // Isso evita o "realce prematuro": colorir texto que ainda não foi falado
      const isSpace = !/\S/.test(tok);
      if (isSpace) cls.push('space');
      return '<span class="' + cls.join(' ') + '" data-idx="' + i + '">' + escapeHtml(tok) + '</span>';
    }).join('');
    applyEditorStyles();
    // Restaura o scroll para a posição anterior
    editor.scrollTop = savedScrollTop;
    // NÃO faz scrollIntoView de .active porque não há .active ainda (será criado pelo onboundary)
    // Em vez disso, faz scroll para o primeiro token a ser lido (startIdx)
    var startToken = editor.querySelector('.token[data-idx="' + startIdx + '"]');
    if (startToken) {
      setTimeout(function() { startToken.scrollIntoView({ block: 'nearest', behavior: 'auto' }); }, 0);
    }
  }

function restoreEditorMode() {
  clearKeepAlive();
  state.isPlaying = false;
  state.isPaused  = false;
  state.currentUtterance = null; // Garante que não há utterance ativo
  state.globalCharOffsetInChunkedText = 0; // Reseta offset para próxima leitura
  state.isInReadingView = false; // Estado de leitura não está ativo após restore

  if (state.currentTokenIdx >= 0) { // Se algo foi lido, preserva os tokens
    state.lastReadTokenIdx = state.currentTokenIdx; // Atualiza o último token lido
    state.isInReadingView = true; // Mantém a view de leitura para persistir
    editor.contentEditable = 'false'; // Desabilita edição para manter o realce
    showEditHint(true); // Indica que é possível interagir para editar (com dblclick)
  } else {
    // Nada foi lido ou leitura terminou completamente, restaura para o modo de edição normal
    clearReadingView();
  }

  updatePlayButton();
  updateStatus();
}

// Limpa a visão colorida e restaura o editor de texto normal
function clearReadingView() {
  // Salva a posição do cursor ANTES de limpar os spans, extraindo o texto real dos tokens
  var cursorCharOffset = 0;
  var allTokenSpans = editor.querySelectorAll('.token');
  
  // Extrai o texto real dos spans (não do state, que pode estar desatualizado)
  var realText = '';
  for (var s = 0; s < allTokenSpans.length; s++) {
    realText += allTokenSpans[s].textContent || '';
  }
  
  // Se não há spans, usa o innerText atual como fallback
  if (!realText && allTokenSpans.length === 0) {
    realText = editor.innerText || state.texts[state.activeTab] || '';
  }
  
  // Calcula o offset do cursor baseado no lastReadTokenIdx (ou no token ativo)
  var targetTokenIdx = state.lastReadTokenIdx >= 0 ? state.lastReadTokenIdx : state.currentTokenIdx;
  if (targetTokenIdx >= 0) {
    for (var s = 0; s < Math.min(targetTokenIdx, allTokenSpans.length); s++) {
      cursorCharOffset += (allTokenSpans[s].textContent || '').length;
    }
  }
  
  state.isInReadingView  = false;
  state.lastReadTokenIdx = -1;
  state.currentTokenIdx  = -1;
  state.readingTokens    = [];
  editor.contentEditable = 'true';
  editor.style.whiteSpace = 'pre-wrap';
  editor.innerText = realText;
  // Atualiza o state para refletir o texto real extraído dos spans
  if (realText) {
    state.texts[state.activeTab] = realText;
  }
  applyEditorStyles();
  showEditHint(false);
  updateStatus();

  // Restaura o cursor para a posição onde o usuário estava (ou final do texto)
  var textLength = editor.innerText.length;
  var targetOffset = (cursorCharOffset > 0 && cursorCharOffset <= textLength) ? cursorCharOffset : textLength;
  
  if (textLength > 0) {
    var range = document.createRange();
    var sel = window.getSelection();
    // Encontra o nó de texto e offset correspondente ao targetOffset via tree-walk
    var pos = 0;
    var foundNode = null, foundOffset = 0;
    
    function walkToOffset(node) {
      if (foundNode) return;
      if (node.nodeType === 3) {
        var end = pos + node.length;
        if (targetOffset >= pos && targetOffset <= end) {
          foundNode = node;
          foundOffset = targetOffset - pos;
        }
        pos += node.length;
      } else if (node.nodeType === 1) {
        if (node.tagName === 'BR') {
          if (targetOffset === pos) { foundNode = node; foundOffset = 0; }
          pos += 1;
        }
        for (var i = 0; i < node.childNodes.length; i++) {
          walkToOffset(node.childNodes[i]);
          if (foundNode) return;
        }
      }
    }
    
    for (var i = 0; i < editor.childNodes.length; i++) {
      walkToOffset(editor.childNodes[i]);
      if (foundNode) break;
    }
    
    if (foundNode && foundNode.nodeType === 3) {
      range.setStart(foundNode, foundOffset);
    } else if (foundNode && foundNode.tagName === 'BR') {
      range.setStart(foundNode.parentNode, Array.prototype.indexOf.call(foundNode.parentNode.childNodes, foundNode));
    } else {
      // Fallback: final do editor
      if (editor.childNodes.length > 0) {
        var lastChild = editor.lastChild;
        if (lastChild.nodeType === 3) {
          range.setStart(lastChild, lastChild.length);
        } else {
          range.setStart(editor, editor.childNodes.length);
        }
      } else {
        range.setStart(editor, 0);
      }
    }
    range.collapse(true);
    sel.removeAllRanges();
    sel.addRange(range);
    editor.focus();
  }
}

// Mostra ou esconde o botão flutuante de editar
 function showEditHint(show) {
  var hint = document.getElementById('edit-hint');
  if (show && !hint) {
    hint = document.createElement('div');
    hint.id = 'edit-hint';
    hint.style.cssText = [
      'position:absolute',
      'bottom:12px',
      'right:16px',
      'background:rgba(0,0,0,0.65)',
      'color:white',
      'font-size:11px',
      'padding:5px 12px',
      'border-radius:4px',
      'z-index:20',

      'box-shadow:0 2px 8px rgba(0,0,0,0.3)'
    ].join(';');
    hint.textContent = '✏️ Clique no texto para editar • Clique num token para reposicionar';
    editor.parentElement.appendChild(hint);
  } else if (!show && hint) {
    hint.remove();
  }
}

  function highlightToken(idx) {
    const prev = editor.querySelector('.token.active');
    if (prev) {
      prev.classList.remove('active');
      prev.classList.add('read');
    }
    const curr = editor.querySelector('.token[data-idx="' + idx + '"]');
    if (curr) {
      curr.classList.add('active');
      const eRect = editor.getBoundingClientRect();
      const cRect = curr.getBoundingClientRect();
      if (cRect.top < eRect.top + 10 || cRect.bottom > eRect.bottom - 10) {
        curr.scrollIntoView({ block: 'center', behavior: 'smooth' });
      }
    }
    const all = editor.querySelectorAll('.token');
    all.forEach(function(span) {
      const i = parseInt(span.dataset.idx);
      if (i < idx && !span.classList.contains('read')) span.classList.add('read');
    });
    state.currentTokenIdx = idx;
    updateStatus();
  }

  // === Voice picker ===
  function updateVoicePickerDisplay() {
    const voice = state.voices.find(function(v) { return v.name === state.selectedVoiceName; });
    voicePickerDisplay.textContent = voice ? (voice.name + ' [' + voice.lang + ']') : 'Selecione uma voz...';
  }

  function renderVoicePicker(filter) {
    voicePickerList.innerHTML = '';
    const f = (filter || '').toLowerCase().trim();
    const filtered = f ? state.voices.filter(function(v) { return (v.name + ' ' + v.lang).toLowerCase().includes(f); }) : state.voices;
    if (!filtered.length) {
      voicePickerList.innerHTML = '<div class="voice-no-results">Nenhuma voz encontrada</div>';
      return;
    }
    const groups = {};
    filtered.forEach(function(v) {
      const prefix = v.lang.split('-')[0];
      if (!groups[prefix]) groups[prefix] = [];
      groups[prefix].push(v);
    });
    const sortedPrefixes = Object.keys(groups).sort();
    const priority = ['pt', 'en', 'es'];
    const ordered = [];
    priority.forEach(function(p) { if (groups[p]) ordered.push(p); });
    sortedPrefixes.forEach(function(p) { if (!priority.includes(p)) ordered.push(p); });

    ordered.forEach(function(prefix) {
      const label = document.createElement('div');
      label.className = 'voice-group-label';
      const langNames = { pt:'Português', en:'Inglês', es:'Espanhol', fr:'Francês', de:'Alemão', it:'Italiano', ja:'Japonês', ko:'Coreano', zh:'Chinês', ru:'Russo', ar:'Árabe', hi:'Hindi' };
      label.textContent = (langNames[prefix] || prefix.toUpperCase()) + ' (' + groups[prefix].length + ')';
      voicePickerList.appendChild(label);
      groups[prefix].forEach(function(v) {
        const opt = document.createElement('div');
        opt.className = 'voice-option' + (v.name === state.selectedVoiceName ? ' selected' : '');
        opt.innerHTML = '<span>' + escapeHtml(v.name) + '</span><span class="lang-tag">' + v.lang + '</span>';
        opt.onclick = function() {
          state.selectedVoiceName = v.name;
          LS.set('balabolka_voice', v.name);
          updateVoicePickerDisplay();
          renderVoicePicker(voiceSearchInput.value);
          voicePickerDropdown.style.display = 'none';
          updateStatus();
        };
        voicePickerList.appendChild(opt);
      });
    });
  }

  voicePickerDisplay.onclick = function(e) {
    e.stopPropagation();
    const showing = voicePickerDropdown.style.display === 'block';
    voicePickerDropdown.style.display = showing ? 'none' : 'block';
    if (!showing) {
      renderVoicePicker('');
      voiceSearchInput.value = '';
      voiceSearchInput.focus();
    }
  };

  voiceSearchInput.oninput = function() { renderVoicePicker(voiceSearchInput.value); };

  document.addEventListener('mousedown', function(e) {
    if (!e.target.closest('#voice-picker-wrap')) {
      voicePickerDropdown.style.display = 'none';
    }
  });

  function loadVoices() {
    console.log('loadVoices called');
    if (!window.speechSynthesis) { console.log('loadVoices: no speechSynthesis'); return; }
    const v = window.speechSynthesis.getVoices();
    console.log('loadVoices: got', v.length, 'voices');
    if (!v.length) { console.log('loadVoices: no voices returned'); return; }
    state.voices = [...v.filter(function(x) { return x.lang.startsWith('pt'); }), ...v.filter(function(x) { return !x.lang.startsWith('pt'); })];
    if (!state.selectedVoiceName || !state.voices.find(function(v) { return v.name === state.selectedVoiceName; })) {
      const def = state.voices.find(function(v) { return v.lang.startsWith('pt'); }) || state.voices[0];
      if (def) state.selectedVoiceName = def.name;
    }
    updateVoicePickerDisplay();
    renderVoicePicker('');
    updateStatus();
  }

  if (window.speechSynthesis) {
    window.speechSynthesis.onvoiceschanged = loadVoices;
    loadVoices();
  } else {
    $('no-tts').style.display = 'flex';
  }

function stopSpeech() {
  clearKeepAlive();
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  restoreEditorMode();
}

function playSpeech() {
  console.log('playSpeech called');
  if (!state.ttsSupported) { console.log('playSpeech: tts not supported'); return; }

  if (state.isPaused) {
    window.speechSynthesis.resume();
    startKeepAlive();
    state.isPaused = false;
    state.isPlaying = true;
    updatePlayButton();
    updateStatus();
    return;
  }

  var allTokens, startIdx;
  var text = getPlainText();

  var cursorOffset; // Declarado em ambos os branches

  if (state.isInReadingView && state.lastReadTokenIdx >= 0) {
    // === Retoma do ponto onde parou ===
    startIdx  = state.lastReadTokenIdx;
    allTokens = state.readingTokens.length > 0
      ? state.readingTokens
      : tokenize(text);
    // Calcula cursorOffset a partir do startIdx para o text.substring funcionar
    cursorOffset = allTokens.slice(0, startIdx).join('').length;

    // Limpa estado de pausa sem apagar o DOM (vamos re-renderizar logo)
    clearKeepAlive();
    window.speechSynthesis.cancel();
    state.isInReadingView  = false;
    state.lastReadTokenIdx = -1;
    showEditHint(false);

  } else {
    // === Início normal pelo cursor ===
    cursorOffset = getCursorOffset();

    // Para qualquer fala anterior (sem salvar posição, pois estamos reiniciando)
    clearKeepAlive();
    window.speechSynthesis.cancel();
    if (state.isInReadingView) {
      state.isInReadingView  = false;
      state.lastReadTokenIdx = -1;
      showEditHint(false);
    }

    allTokens = tokenize(text);
    startIdx  = findStartToken(allTokens, cursorOffset);
    // Se o cursor caiu em whitespace (linha vazia, espaços), pula para o próximo token não-whitespace
    startIdx  = skipWhitespaceTokens(allTokens, startIdx);
  }

  let fullTextToSpeak = text.substring(cursorOffset); // Use original text substring
  let tokensToSpeak   = allTokens.slice(startIdx);

  if (!fullTextToSpeak.trim()) {
    // Se não sobrou nada (chegou ao fim), recomeça do início
    startIdx        = 0;
    cursorOffset    = 0;
    allTokens       = tokenize(text);
    tokensToSpeak   = allTokens;
    fullTextToSpeak = text;
    if (!fullTextToSpeak.trim()) return;
  }

  state.readingTokens  = allTokens;
  state.readingStartIdx = startIdx;
  state.isPlaying      = true;
  state.currentTokenIdx = -1;
  renderReadingMode(allTokens, startIdx);

  // Divide em chunks para leitura contínua no Chrome/Edge
  const chunks = splitTextIntoChunks(fullTextToSpeak, 3000);

  // Mapeia tokens para posições de caractere ABSOLUTAS no 'text' original
  // Esta parte é crucial para a sincronia
  let absCharOffsetInFullText = 0;
  const fullTextTokenMap = [];
  for (let i = 0; i < allTokens.length; i++) {
    fullTextTokenMap.push({
      start: absCharOffsetInFullText,
      end: absCharOffsetInFullText + allTokens[i].length,
      idx: i
    });
    absCharOffsetInFullText += allTokens[i].length;
  }

  let globalCharOffsetInChunkedText = 0; // Offset para o texto chunkado que a API está lendo
  let lastTokenIdx     = -1;

  function speakChunk(chunkIndex) {
    if (chunkIndex >= chunks.length || !state.isPlaying) {
      restoreEditorMode();
      return;
    }

    var chunk = chunks[chunkIndex];
    var utter = new SpeechSynthesisUtterance(chunk);
    var voice = state.voices.find(function(v) { return v.name === state.selectedVoiceName; })
                || state.voices.find(function(v) { return v.lang.startsWith('pt'); })
                || state.voices[0];
    if (voice) { utter.voice = voice; utter.lang = voice.lang; }
    utter.rate   = state.rate;
    utter.pitch  = state.pitch;
    utter.volume = state.volume;

    var chunkOffset = globalCharOffsetInChunkedText;

    utter.onstart = function() { startKeepAlive(); };

    utter.onboundary = function(e) {
      if (e.name !== 'word') return;
      // Calcula o índice de caractere absoluto em relação ao texto COMPLETO original
      var absCharIndex = cursorOffset + chunkOffset + e.charIndex; // cursorOffset já é absoluto

      var activeIdx = -1;
      // Procura o token correspondente no fullTextTokenMap
      for (var t = 0; t < fullTextTokenMap.length; t++) {
        if (absCharIndex >= fullTextTokenMap[t].start && absCharIndex < fullTextTokenMap[t].end) {
          activeIdx = fullTextTokenMap[t].idx;
          break;
        }
      }
      if (activeIdx !== -1 && activeIdx !== lastTokenIdx) {
        lastTokenIdx = activeIdx;
        highlightToken(activeIdx);
      }
    };

    utter.onend = function() {
      clearKeepAlive();
      globalCharOffsetInChunkedText += chunk.length;
      speakChunk(chunkIndex + 1);
    };

    utter.onerror = function(e) {
      clearKeepAlive();
      if (e.error !== 'interrupted' && e.error !== 'canceled') {
        restoreEditorMode();
      }
    };

    window.speechSynthesis.speak(utter);
    state.currentUtterance = utter;
  }

  speakChunk(0);
  updatePlayButton();
  updateStatus();
}

  // =====================================================================
  // === pauseSpeech: para o keep-alive durante a pausa               ===
  // =====================================================================
  function pauseSpeech() {
    if (!state.ttsSupported || !state.isPlaying || state.isPaused) return;
    clearKeepAlive();
    window.speechSynthesis.pause();
    state.isPaused = true;
    state.isPlaying = false;
    updatePlayButton();
    updateStatus();
  }

  // =====================================================================
  // === reapplySpeechIfPlaying: também usa keep-alive               ===
  // =====================================================================
  function reapplySpeechIfPlaying() {
    if (!state.ttsSupported || !state.isPlaying || state.isPaused) return;

    clearKeepAlive();
    if (window.speechSynthesis) {
      window.speechSynthesis.cancel();
    }

    const currentText = getPlainText(); // Pega o texto atual (do editor)
    const allTokens = tokenize(currentText); // Tokeniza o texto completo novamente

    const startIdx = state.currentTokenIdx >= 0 ? state.currentTokenIdx : state.readingStartIdx;

    // Recalcula o cursorOffset (ponto de início no texto completo)
    let cursorOffset = 0;
    for (let i = 0; i < startIdx; i++) {
        cursorOffset += allTokens[i].length;
    }

    const fullTextToSpeakReapply = currentText.substring(cursorOffset);
    if (!fullTextToSpeakReapply.trim()) {
        restoreEditorMode();
        return;
    }

    const chunks = splitTextIntoChunks(fullTextToSpeakReapply, 3000);

    // Mapeia tokens para posições de caractere ABSOLUTAS no 'currentText' (texto completo)
    let absCharOffsetInFullText = 0;
    const fullTextTokenMap = [];
    for (let i = 0; i < allTokens.length; i++) {
      fullTextTokenMap.push({
        start: absCharOffsetInFullText,
        end: absCharOffsetInFullText + allTokens[i].length,
        idx: i
      });
      absCharOffsetInFullText += allTokens[i].length;
    }

    let globalCharOffsetInChunkedText = 0;
    let lastTokenIdx = -1;

    function speakChunk(chunkIndex) {
      if (chunkIndex >= chunks.length || !state.isPlaying) {
        restoreEditorMode();
        return;
      }

      const chunk = chunks[chunkIndex];
      const utter = new SpeechSynthesisUtterance(chunk);
      const voice = state.voices.find(function(v) { return v.name === state.selectedVoiceName; })
                    || state.voices.find(function(v) { return v.lang.startsWith('pt'); })
                    || state.voices[0];
      if (voice) { utter.voice = voice; utter.lang = voice.lang; }
      utter.rate   = state.rate;
      utter.pitch  = state.pitch;
      utter.volume = state.volume;

      const chunkOffset = globalCharOffsetInChunkedText;

      utter.onstart = function() {
        startKeepAlive();
      };

      utter.onboundary = function(e) {
        if (e.name !== 'word') return;
        // Calcula o índice de caractere absoluto em relação ao texto COMPLETO original
        const absCharIndex = cursorOffset + chunkOffset + e.charIndex;

        let activeIdx = -1;
        for (let t = 0; t < fullTextTokenMap.length; t++) {
            if (absCharIndex >= fullTextTokenMap[t].start && absCharIndex < fullTextTokenMap[t].end) {
                activeIdx = fullTextTokenMap[t].idx;
                break;
            }
        }

        if (activeIdx !== -1 && activeIdx !== lastTokenIdx) {
          lastTokenIdx = activeIdx;
          highlightToken(activeIdx);
        }
      };

      utter.onend = function() {
        clearKeepAlive();
        globalCharOffsetInChunkedText += chunk.length;
        speakChunk(chunkIndex + 1);
      };

      utter.onerror = function(e) {
        clearKeepAlive();
        if (e.error !== 'interrupted' && e.error !== 'canceled') {
          restoreEditorMode();
        }
      };

      window.speechSynthesis.speak(utter);
      state.currentUtterance = utter;
    }

    speakChunk(0);
  }

  // === Tabs ===
  function renderTabs() {
    tabbar.innerHTML = '';

      const div = document.createElement('div');
      div.className = 'tab-item' + (i === state.activeTab ? ' active' : '');

        const inp = document.createElement('input');
        inp.className = 'tab-input';
        inp.value = tab;
        inp.autofocus = true;
        inp.onblur = function() { if (inp.value.trim()) state.tabs[i] = inp.value.trim(); state.renaming = -1; renderTabs(); updateTitle(); };
        inp.onkeydown = function(e) { if (e.key === 'Enter') inp.blur(); if (e.key === 'Escape') { state.renaming = -1; renderTabs(); } };
        div.appendChild(inp);
      } else {
        const span = document.createElement('span');
        span.textContent = tab + (state.isDirty && i === state.activeTab ? '*' : '');
        span.style.overflow = 'hidden';
        span.style.textOverflow = 'ellipsis';
        span.style.cursor = 'pointer';
        span.style.userSelect = 'none';
        span.ondblclick = function() { state.renaming = i; renderTabs(); };

          const close = document.createElement('button');
          close.className = 'tab-close';
          close.textContent = '×';

      div.onclick = function() { switchTab(i); };

  function addTab() {

    if (state.isInReadingView) clearReadingView();
    state.tabs.splice(i, 1);
    state.texts.splice(i, 1);
    if (state.activeTab >= i) state.activeTab = Math.max(0, state.activeTab - 1);
    saveTabs(); updateEditor(); renderTabs(); updateTitle(); updateStatus();
  }

  function saveTabs() {
    LS.set('balabolka_tabs', state.tabs);

  function updateEditor() {
    if (state.isPlaying || state.isPaused || state.isInReadingView) return;
    var text = state.texts[state.activeTab] || '';

      editor.style.display   = 'none';

  function applyEditorStyles() {
    const targets = state.isRenderedMd ? [mdViewer] : [editor];
    targets.forEach(function(target) {
      const z = state.zoom / 100;
      target.style.backgroundColor = state.colors.bg;
      target.style.color = state.colors.text;
      target.style.fontFamily = state.font.family;
      target.style.fontSize = (state.font.size * z) + 'px';
      target.style.fontWeight = state.font.bold ? 'bold' : 'normal';
      target.style.fontStyle = state.font.italic ? 'italic' : 'normal';
      target.style.lineHeight = state.font.lineHeight || 1.4;
    });

  function updateTitle() {

    $('st-doc').textContent = name + (state.isDirty ? '*' : '');

  function updateStatus() {
    const text = state.texts[state.activeTab] || '';
    const lines = text.split('\n').length;
    const words = text.trim() ? text.trim().split(/\s+/).length : 0;
    const chars = text.length;
    $('st-lines').textContent = 'Linhas: ' + lines;
    $('st-words').textContent = 'Palavras: ' + words;
    $('st-chars').textContent = 'Chars: ' + chars;
    $('st-zoom').textContent = 'Zoom: ' + state.zoom + '%';
    const voice = state.voices.find(function(v) { return v.name === state.selectedVoiceName; });
    $('st-voice').textContent = voice ? '🎙 ' + voice.name : 'Sem voz';
    $('st-lang').textContent = voice ? voice.lang : '—';
    $('st-status').textContent = state.isPlaying ? '▶ Lendo...' : state.isPaused ? '⏸ Pausado' : '⏹ Parado';
    if (state.isPlaying && state.currentTokenIdx >= 0) {
      $('st-cursor').textContent = 'Cursor: ' + (state.currentTokenIdx + 1) + ' de ' + state.readingTokens.length;
    } else {
      $('st-cursor').textContent = 'Cursor: 0 de ' + words;
    }
    const WPM_BASE = 160;
    const effectiveWpm = WPM_BASE * state.rate;
    const timeSec = effectiveWpm > 0 ? Math.ceil((words / effectiveWpm) * 60) : 0;
    $('st-time').textContent = 'Tempo estimado: ' + Math.floor(timeSec / 60) + 'm ' + (timeSec % 60) + 's';
    updateTitle();
  }

  // === File handling ===
  function processFile(file) {
    const reader = new FileReader();
    reader.onload = function(e) {
      let text = e.target.result;
      const ext = (file.name.split('.').pop() || '').toLowerCase();
      if (ext === 'html' || ext === 'htm') text = text.replace(/<[^>]*>/g, '');
      state.texts.push(text);
      state.tabs.push(file.name);
      state.activeTab = state.tabs.length - 1;
      state.isDirty = false;
      saveTabs(); updateEditor(); renderTabs(); updateTitle(); updateStatus();
    };
    reader.readAsText(file);
  }

  fileInput.onchange = function(e) { Array.from(e.target.files || []).forEach(processFile); e.target.value = ''; };

  dropZone.ondragover = function(e) { e.preventDefault(); state.dragging = true; showDragOverlay(); };
  dropZone.ondragleave = function(e) { e.preventDefault(); state.dragging = false; hideDragOverlay(); };
  dropZone.ondrop = function(e) { e.preventDefault(); state.dragging = false; hideDragOverlay(); Array.from(e.dataTransfer.files || []).forEach(processFile); };

 function openFind() {

  // -----------------------------------------------------------------------
  // Busca usando editor.innerText para garantir que os offsets batem
  // com o que está renderizado no DOM, incluindo quebras de linha
  // -----------------------------------------------------------------------
  function findAllMatches() {
    var needle = fpFind.value;
    state.findText    = needle;
    state.findCase    = fpCase.checked;
    state.replaceText = fpReplace.value;

    clearFindHighlight();
    matches      = [];
    currentMatch = -1;
    fpResult.style.display = 'none';

    if (!needle) { updateCounter(); return; }

    // Usa innerText para que os offsets reflitam exatamente o DOM
    var haystack = editor.innerText || '';
    var flags    = state.findCase ? 'g' : 'gi';
    var regex;
    try {
      regex = new RegExp(needle.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), flags);
    } catch(e) { updateCounter(); return; }

    var m;
    while ((m = regex.exec(haystack)) !== null) {
      matches.push({ start: m.index, end: m.index + m[0].length });
    }

    updateCounter();

    if (matches.length > 0) {
      currentMatch = 0;
      selectMatchInEditor(matches[0]);
    }
  }

  function goToMatch(idx) {
    if (matches.length === 0) { findAllMatches(); return; }

    updateCounter();

  // -----------------------------------------------------------------------
  // Mapeia um offset de caractere (baseado em innerText) para o nó de
  // texto e posição exatos dentro do contenteditable.
  //
  // A diferença crítica em relação à versão anterior: quando encontramos
  // um elemento de bloco (div, p etc.) que NÃO é o primeiro filho do seu
  // pai, incrementamos o contador em 1 — porque o browser insere um \n
  // implícito entre blocos, e o innerText reflete isso. Sem essa conta,
  // os offsets ficam descalibrados a cada quebra de linha.
  // -----------------------------------------------------------------------
  function resolveOffset(container, targetOffset) {
    var pos   = 0;
    var found = null;

    var BLOCK_TAGS = {
      div: 1, p: 1, li: 1,
      h1: 1, h2: 1, h3: 1, h4: 1, h5: 1, h6: 1,
      blockquote: 1, pre: 1, tr: 1
    };

    function walk(node, isFirstChild) {
      if (found) return;

      if (node.nodeType === 3) {           // nó de texto
        var end = pos + node.length;
        if (targetOffset >= pos && targetOffset <= end) {
          found = { node: node, offset: targetOffset - pos };
        }
        pos += node.length;

      } else if (node.nodeType === 1) {    // elemento
        var tag = node.tagName.toLowerCase();

        if (tag === 'br') {
          // <br> representa 1 caractere \n no innerText
          if (targetOffset === pos) {
            // O alvo cai exatamente no br — usa o pai como âncora
            found = { node: node.parentNode, offset: Array.prototype.indexOf.call(node.parentNode.childNodes, node) };
          }
          pos += 1;
          return;
        }

        // Elemento de bloco que não é o primeiro filho contribui com 1 \n
        if (!isFirstChild && BLOCK_TAGS[tag]) {
          if (targetOffset === pos) {
            found = { node: node, offset: 0 };
          }
          pos += 1;
          if (found) return;
        }

        var first = true;
        var children = node.childNodes;
        for (var i = 0; i < children.length; i++) {
          walk(children[i], first);
          first = false;
          if (found) return;
        }
      }
    }

    // Percorre os filhos diretos do container (o editor)
    var first = true;
    var kids  = container.childNodes;
    for (var i = 0; i < kids.length; i++) {
      walk(kids[i], first);
      first = false;
      if (found) break;
    }

    return found;
  }

  function selectMatchInEditor(match) {
    if (!match) return;

    var startResult = resolveOffset(editor, match.start);
    var endResult   = resolveOffset(editor, match.end);

    if (!startResult || !endResult) return;

    try {
      var range = document.createRange();
      range.setStart(startResult.node, startResult.offset);
      range.setEnd(endResult.node,     endResult.offset);

      var sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);

      // Rola o editor para o centro
      var rangeRect  = range.getBoundingClientRect();
      var editorRect = editor.getBoundingClientRect();
      if (rangeRect.top < editorRect.top + 20 || rangeRect.bottom > editorRect.bottom - 20) {
        var relTop = rangeRect.top - editorRect.top + editor.scrollTop;
        editor.scrollTop = relTop - editor.clientHeight / 2;
      }
    } catch(e) {
      // Range inválido (ex: editor foi modificado entre buscas)
    }
  }

  // -----------------------------------------------------------------------
  // Substituir este resultado
  // -----------------------------------------------------------------------
  function replaceOne() {
    if (matches.length === 0 || currentMatch < 0) return;
    var rep   = fpReplace.value;
    var match = matches[currentMatch];
    // Trabalha sobre state.texts para persistir, depois re-sincroniza o editor
    var text = state.texts[state.activeTab] || '';

    // Recalcula offset em state.texts (pode diferir 1 char por \n no Edge)
    // por segurança buscamos a ocorrência pela posição atual no innerText
    var haystack = editor.innerText || '';
    var needle   = haystack.substring(match.start, match.end);
    var before   = haystack.substring(0, match.start);
    var after    = haystack.substring(match.end);
    var newInner = before + rep + after;

    state.texts[state.activeTab] = newInner;
    state.isDirty = true;
    saveTabs();
    updateEditor();
    updateStatus();

    setTimeout(findAllMatches, 0);
  }

  // -----------------------------------------------------------------------
  // Substituir tudo
  // -----------------------------------------------------------------------
  function replaceAll() {
    var needle = fpFind.value;
    var rep    = fpReplace.value;
    state.findText    = needle;
    state.replaceText = rep;
    state.findCase    = fpCase.checked;
    if (!needle) return;

    var flags = state.findCase ? 'g' : 'gi';
    var regex;
    try {
      regex = new RegExp(needle.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), flags);
    } catch(e) { return; }

    var count = ((state.texts[state.activeTab] || '').match(regex) || []).length;
    state.texts[state.activeTab] = (state.texts[state.activeTab] || '').replace(regex, rep);
    state.isDirty = true;
    saveTabs();
    updateEditor();
    updateStatus();

    matches      = [];
    currentMatch = -1;
    updateCounter();

    fpResult.style.display    = 'block';
    fpResult.style.background = count > 0 ? '#f0fdf4' : '#fef2f2';
    fpResult.style.border     = count > 0 ? '1px solid #86efac' : '1px solid #fca5a5';
    fpResult.style.color      = count > 0 ? '#15803d' : '#b91c1c';
    fpResult.textContent      = count > 0
      ? count + ' substituição(ões) realizada(s).'
      : 'Nenhuma ocorrência encontrada.';
  }

    let dragging = false, offsetX = 0, offsetY = 0;
    const box = overlay.querySelector('.modal-box');
    tbar.onmousedown = function(e) {
      if (e.target.closest('.modal-close')) return;
      dragging = true;
      const rect = box.getBoundingClientRect();
      offsetX = e.clientX - rect.left;
      offsetY = e.clientY - rect.top;
      box.style.position = 'fixed';
      box.style.left   = rect.left + 'px';
      box.style.top    = rect.top + 'px';
      box.style.right  = 'auto';
      box.style.bottom = 'auto';
      box.style.margin = '0';
      e.preventDefault();
    };
    window.addEventListener('mousemove', function(e) {
      if (!dragging) return;
      box.style.left = (e.clientX - offsetX) + 'px';
      box.style.top  = (e.clientY - offsetY) + 'px';
    });
    window.addEventListener('mouseup', function() { dragging = false; });
  }

  function closeModal() {
    const ov = $('modal-overlay');
    if (ov) ov.remove();
    document.removeEventListener('keydown', modalEsc);
  }
  function modalEsc(e) { if (e.key === 'Escape') closeModal(); }

  function alertModal(title, message) {
    const html = '<div style="padding:16px; display:flex; flex-direction:column; gap:12px;"><div style="display:flex; align-items:flex-start; gap:12px"><span style="font-size:28px">ℹ️</span><p style="font-size:12px; color:#374151; white-space:pre-wrap; flex:1">' + escapeHtml(message) + '</p></div><div style="display:flex; justify-content:flex-end; padding-top:8px; border-top:1px solid #d1d5db"><button class="xp-btn" style="font-weight:bold; padding-left:24px; padding-right:24px" id="alert-ok">OK</button></div></div>';
    openModal(title, html, '380px');
    $('alert-ok').onclick = closeModal;
  }

  function confirmModal(title, message, onYes) {
    const html = '<div style="padding:16px; display:flex; flex-direction:column; gap:12px;"><div style="display:flex; align-items:flex-start; gap:12px"><span style="font-size:28px">❓</span><p style="font-size:12px; color:#374151; white-space:pre-wrap; flex:1">' + escapeHtml(message) + '</p></div><div style="display:flex; justify-content:flex-end; gap:8px; padding-top:8px; border-top:1px solid #d1d5db"><button class="xp-btn" style="font-weight:bold" id="confirm-yes">Sim</button><button class="xp-btn cancel" id="confirm-no">Não</button></div></div>';
    openModal(title, html, '380px');
    $('confirm-yes').onclick = function() { onYes(); closeModal(); };
    $('confirm-no').onclick = closeModal;
  }

  // === Hotkeys ===
  document.addEventListener('keydown', function(e) {
    const modalOpen = !!$('modal-overlay');
    if (e.key === 'F5') { e.preventDefault(); playSpeech(); }
    if (e.key === 'F6') { e.preventDefault(); pauseSpeech(); }
    if (e.key === 'Escape' && !modalOpen) { e.preventDefault(); stopSpeech(); closeMenu(); }
    if (e.ctrlKey && e.key === 'h') { e.preventDefault(); openFind(); }
    if (e.ctrlKey && e.key === 'f') { e.preventDefault(); openFind(); }
    if (e.ctrlKey && e.key === 'n') { e.preventDefault(); addTab(); }
    if (e.ctrlKey && e.key === 'o') { e.preventDefault(); fileInput.click(); }
    if (e.ctrlKey && !e.shiftKey && e.key === 'z') { e.preventDefault(); document.execCommand('undo'); }
    if ((e.ctrlKey && e.key === 'y') || (e.ctrlKey && e.shiftKey && e.key === 'z')) { e.preventDefault(); document.execCommand('redo'); }
    if (e.ctrlKey && e.key === 's') { e.preventDefault(); saveText(); }
    if (e.ctrlKey && (e.key === '=' || e.key === '+')) { e.preventDefault(); state.zoom = Math.min(state.zoom + 10, 200); LS.set('balabolka_zoom', state.zoom); updateEditor(); updateStatus(); }
    if (e.ctrlKey && e.key === '-') { e.preventDefault(); state.zoom = Math.max(state.zoom - 10, 50); LS.set('balabolka_zoom', state.zoom); updateEditor(); updateStatus(); }
    if (e.ctrlKey && e.key === '0') { e.preventDefault(); state.zoom = 100; LS.set('balabolka_zoom', state.zoom); updateEditor(); updateStatus(); }
  });

  document.addEventListener('wheel', function(e) {
    if (e.ctrlKey) {
      e.preventDefault();
      const d = e.deltaY > 0 ? -10 : 10;
      state.zoom = Math.max(50, Math.min(200, state.zoom + d));
      LS.set('balabolka_zoom', state.zoom);
      updateEditor(); updateStatus();
    }
  }, { passive: false });

  // === Init ===
  updateEditor(); renderTabs(); updateTitle(); updateStatus();

  // Debug: expose playSpeech globally
  window.playSpeech = playSpeech;
  console.log('Balabolka init complete. state.ttsSupported:', state.ttsSupported, 'voices:', state.voices.length);
})();
  </script>
</body>
