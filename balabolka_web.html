<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Balabolka Web</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body,
    #root {
      height: 100%;
      width: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    input[type=range] {
      cursor: pointer;
      accent-color: #2563eb;
    }

    input[type=color] {
      cursor: pointer;
      padding: 0;
      border: 1px solid #9ca3af;
    }

    .toolbar-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid transparent;
      cursor: pointer;
      background: transparent;
      transition: border-color 0.1s, background 0.1s;
    }

    .toolbar-btn:hover,
    .toolbar-btn.active {
      border-color: #99d1ff;
      background: #cce8ff;
    }

    .menu-btn {
      padding: 2px 8px;
      font-size: 12px;
      background: transparent;
      border: 1px solid transparent;
      cursor: pointer;
    }

    .menu-btn:hover,
    .menu-btn.active {
      background: #cce8ff;
      border-color: #99d1ff;
    }

    .menu-dropdown {
      position: absolute;
      top: 100%;
      left: 0;
      background: white;
      border: 1px solid #aca899;
      box-shadow: 2px 2px 6px rgba(0, 0, 0, 0.3);
      min-width: 220px;
      z-index: 500;
      padding: 4px 0;
    }

    .menu-item {
      width: 100%;
      text-align: left;
      padding: 3px 16px;
      font-size: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 32px;
      background: transparent;
      border: none;
      cursor: pointer;
    }

    .menu-item:hover {
      background: #cce8ff;
    }

    .menu-item .shortcut {
      color: #9ca3af;
      font-size: 10px;
    }

    .menu-sep {
      border-top: 1px solid #e5e7eb;
      margin: 3px 0;
    }

    .status-item {
      border: 1px solid #aca899;
      border-right-color: white;
      border-bottom-color: white;
      padding: 1px 4px;
      background: #f0f0f0;
      white-space: nowrap;
      font-size: 10px;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.3);
    }

    .modal-box {
      background: #ece9d8;
      display: flex;
      flex-direction: column;
      box-shadow: 4px 4px 16px rgba(0, 0, 0, 0.5);
      border: 2px solid white;
      border-right-color: #404040;
      border-bottom-color: #404040;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-titlebar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 5px 10px;
      font-weight: bold;
      font-size: 12px;
      color: white;
      flex-shrink: 0;
      background: linear-gradient(to right, #0058e6, #3a93ff);
      -webkit-user-select: none;
      user-select: none;
    }

    .modal-close {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      color: white;
      cursor: pointer;
      font-size: 11px;
      border-radius: 2px;
    }

    .modal-close:hover {
      background: #ef4444;
    }

    .xp-btn {
      font-size: 12px;
      padding: 2px 16px;
      cursor: pointer;
      border: 1px solid #003c74;
      background: linear-gradient(to bottom, #ffffff, #e0e0e0);
    }

    .xp-btn:hover {
      background: linear-gradient(to bottom, #ffffff, #cccccc);
    }

    .xp-btn.cancel {
      border-color: #9ca3af;
    }

    .xp-input {
      font-size: 12px;
      border: 1px solid #7f9db9;
      padding: 2px 6px;
      width: 100%;
      outline: none;
      background: white;
    }

    .xp-select {
      font-size: 12px;
      border: 1px solid #7f9db9;
      padding: 2px 4px;
      outline: none;
      background: white;
      width: 100%;
    }

    .tab-item {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 2px 12px;
      font-size: 12px;
      cursor: pointer;
      border: 1px solid #aca899;
      border-bottom: none;
      max-width: 120px;
      overflow: hidden;
      white-space: nowrap;
      user-select: none;
    }

    .tab-item.active {
      background: #ece9d8;
      font-weight: 600;
      position: relative;
      z-index: 10;
    }

    .tab-item:not(.active) {
      background: #c0c0c0;
      color: #4b5563;
    }

    .tab-item:not(.active):hover {
      background: #d0d0d0;
    }

    .tab-close {
      color: #9ca3af;
      font-weight: bold;
      cursor: pointer;
      margin-left: 2px;
      background: none;
      border: none;
      font-size: 13px;
      line-height: 1;
      padding: 0;
    }

    .tab-close:hover {
      color: #ef4444;
    }

    .editor-area {
      width: 100%;
      height: 100%;
      padding: 12px;
      resize: none;
      outline: none;
      border: none;
      /* line-height é controlado via fontSettings.lineHeight (estado React) */
      overflow-y: auto;
      overflow-x: hidden;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
      /* Força o navegador a respeitar o scroll da roda */
      touch-action: pan-y;
      overscroll-behavior: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* Cursor visual tipo barra de texto (karaoke) */
    .karaoke-cursor {
      display: inline;
      position: relative;
    }
    .karaoke-cursor::after {
      content: "";
      position: absolute;
      left: -1px;
      top: 0;
      bottom: 0;
      width: 2px;
      background-color: var(--cursor-color, #00ff66);
      animation: karaoke-blink 1s steps(1) infinite;
      pointer-events: none;
    }
    @keyframes karaoke-blink {
      50% { opacity: 0; }
    }

    .slider-group {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
      min-width: 140px;
    }

    .slider-label {
      font-size: 10px;
      color: #374151;
      white-space: nowrap;
      width: 64px;
      font-weight: 600;
    }

    .slider-value {
      font-size: 10px;
      color: #374151;
      width: 40px;
      text-align: right;
      font-family: monospace;
      font-weight: bold;
    }

    .color-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .color-row label {
      font-size: 12px;
      color: #374151;
      flex: 1;
    }

    .color-preview {
      width: 24px;
      height: 24px;
      border: 1px solid #9ca3af;
      border-radius: 2px;
    }

    .drag-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 88, 230, 0.3);
      border: 4px dashed #0058e6;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .drag-box {
      background: #ece9d8;
      padding: 32px;
      border: 2px solid white;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .recording-badge {
      position: fixed;
      bottom: 16px;
      right: 16px;
      z-index: 1100;
      background: #dc2626;
      color: white;
      font-size: 12px;
      padding: 6px 16px;
      border-radius: 4px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      display: flex;
      align-items: center;
      gap: 8px;
      animation: pulse 1.5s ease-in-out infinite;
    }

    .rec-dot {
      width: 8px;
      height: 8px;
      background: white;
      border-radius: 50%;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0.6
      }
    }

    .clipboard-panel {
      width: 256px;
      flex-shrink: 0;
      background: #2b2b2b;
      color: white;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #555;
      overflow: hidden;
      z-index: 20;
    }

    .clipboard-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 12px;
      border-bottom: 1px solid #444;
      font-size: 12px;
      font-weight: bold;
    }

    .clipboard-close {
      background: none;
      border: none;
      color: #9ca3af;
      cursor: pointer;
      font-size: 12px;
    }

    .clipboard-close:hover {
      color: white;
    }

    .clipboard-item {
      text-align: left;
      font-size: 12px;
      background: #333;
      border: 1px solid #444;
      padding: 8px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      border-radius: 2px;
      color: white;
    }

    .clipboard-item:hover {
      border-color: #3a93ff;
      background: #3a3a4a;
    }

    .titlebar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 8px;
      height: 32px;
      flex-shrink: 0;
      background: linear-gradient(to bottom, #0058e6, #3a93ff);
    }

    .titlebar-title {
      display: flex;
      align-items: center;
      gap: 8px;
      color: white;
      font-weight: bold;
      font-size: 12px;
    }

    .titlebar-fs {
      width: 20px;
      height: 20px;
      font-size: 10px;
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      cursor: pointer;
    }

    .titlebar-fs:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .menubar {
      display: flex;
      background: #ece9d8;
      border-bottom: 1px solid #aca899;
      flex-shrink: 0;
      position: relative;
      z-index: 200;
    }

    .toolbar {
      display: flex;
      align-items: center;
      padding: 4px;
      background: #ece9d8;
      border-bottom: 1px solid #aca899;
      flex-shrink: 0;
      flex-wrap: wrap;
      gap: 2px;
    }

    .toolbar-sep {
      width: 1px;
      height: 20px;
      background: #aca899;
      box-shadow: 1px 0 0 white;
      margin: 0 4px;
    }

    .voice-panel {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 6px 8px;
      background: #ece9d8;
      border-bottom: 1px solid #aca899;
      flex-shrink: 0;
    }

    .voice-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .voice-label {
      font-size: 12px;
      font-weight: 600;
      color: #374151;
      white-space: nowrap;
    }

    .sliders-row {
      display: flex;
      gap: 16px;
      padding: 0 4px;
      flex-wrap: wrap;
    }

    .tabbar {
      display: flex;
      align-items: flex-end;
      background: #d4d0c8;
      border-bottom: 1px solid #aca899;
      flex-shrink: 0;
      padding: 4px 4px 0;
      gap: 2px;
    }

    .tab-add {
      padding: 2px 8px;
      font-size: 12px;
      border: 1px solid #aca899;
      background: #c0c0c0;
      cursor: pointer;
      font-weight: bold;
    }

    .tab-add:hover {
      background: #d0d0d0;
    }

    .main-area {
      display: flex;
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    .editor-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    .statusbar {
      display: flex;
      align-items: center;
      height: 24px;
      padding: 0 4px;
      background: #ece9d8;
      border-top: 1px solid #aca899;
      flex-shrink: 0;
      gap: 8px;
    }

    .statusbar-spacer {
      flex: 1;
    }

    .no-tts-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.8);
      z-index: 30;
    }

    .no-tts-box {
      background: #ece9d8;
      padding: 24px;
      border: 2px solid #808080;
      max-width: 320px;
      text-align: center;
    }

    .play-stop-btn {
      font-size: 12px;
      padding: 2px 12px;
      border-radius: 0;
      cursor: pointer;
      font-weight: bold;
      border: 1px solid;
    }

    /* Scrollbar customization for webkit */
    ::-webkit-scrollbar {
      width: 12px;
      height: 12px;
    }

    ::-webkit-scrollbar-track {
      background: #f0f0f0;
    }

    ::-webkit-scrollbar-thumb {
      background: #aca899;
      border: 2px solid #f0f0f0;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #888;
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useLayoutEffect, useRef, useCallback, useMemo } = React;

    // ─── Selection Utilities ──────────────────────────────────────────────────
    // Saves current cursor character offset within a contentEditable element
    const saveSelection = (containerEl) => {
      const selection = window.getSelection();
      if (!selection || selection.rangeCount === 0) return 0;
      const range = selection.getRangeAt(0);
      const preSelectionRange = range.cloneRange();
      preSelectionRange.selectNodeContents(containerEl);
      preSelectionRange.setEnd(range.startContainer, range.startOffset);
      return preSelectionRange.toString().length;
    };

    // Restores cursor to a specific character offset within a contentEditable element
    const restoreSelection = (containerEl, offset) => {
      let charCount = 0;
      const range = document.createRange();
      range.setStart(containerEl, 0);
      range.collapse(true);
      const nodeStack = [containerEl];
      let node, foundStart = false, stop = false;

      while (!stop && (node = nodeStack.pop())) {
        if (node.nodeType === 3) { // Text node
          const nextCharCount = charCount + node.length;
          if (!foundStart && offset >= charCount && offset <= nextCharCount) {
            range.setStart(node, offset - charCount);
            range.setEnd(node, offset - charCount);
            foundStart = true;
            stop = true;
          }
          charCount = nextCharCount;
        } else {
          let i = node.childNodes.length;
          while (i--) {
            nodeStack.push(node.childNodes[i]);
          }
        }
      }
      const selection = window.getSelection();
      selection.removeAllRanges();
      selection.addRange(range);
    };

    // ─── Constants ────────────────────────────────────────────────────────────────
    const DEFAULT_COLORS = {
      textColor: "#ffffff",
      bgColor: "#000000",
      readColor: "#ff4444",
      selectionColor: "#3399ff",
      highlightColor: "#3399ff",
    };

    const FONT_FAMILIES = [
      "Courier New", "Arial", "Times New Roman", "Verdana",
      "Georgia", "Tahoma", "Segoe UI", "Consolas",
    ];



    // ─── Markdown Utilities ──────────────────────────────────────────────────────
    function stripMarkdown(text) {
      if (!text) return "";
      let clean = text;

      // Remove code blocks
      clean = clean.replace(/```[\s\S]*?```/g, "");

      // Remove inline code
      clean = clean.replace(/`([^`]+)`/g, "$1");

      // Remove images completely
      clean = clean.replace(/!\[([^\]]*)]\(([^)]*)\)/g, "");

      // Remove links, leaving only the text: [text](url) -> text
      clean = clean.replace(/\[([^\]]+)]\(([^)]+)\)/g, "$1");

      // Remove bold/italic: **text** -> text, *text* -> text, __text__ -> text, _text_ -> text
      clean = clean.replace(/\*\*([^*]+)\*\*/g, "$1");
      clean = clean.replace(/__([^_]+)__/g, "$1");
      clean = clean.replace(/\*([^*]+)\*/g, "$1");
      clean = clean.replace(/_([^_]+)_/g, "$1");

      // Remove strikethrough: ~~text~~ -> text
      clean = clean.replace(/~~([^~]+)~~/g, "$1");

      // Remove header tags: # ## ###
      clean = clean.replace(/^[#\s]+/gm, "");

      // Remove blockquote symbol at line start
      clean = clean.replace(/^>\s*/gm, "");

      // Remove horizontal rules
      clean = clean.replace(/^(---\s*|\*\*\*\s*|___\s*)$/gm, "");

      // Remove list symbols at line start
      clean = clean.replace(/^\s*[-*+]\s+/gm, "");
      clean = clean.replace(/^\s*\d+\.\s+/gm, "");

      // Remove table lines or separators: | col | -> col (just remove table borders and separators)
      clean = clean.replace(/^[|\s-]+$/gm, ""); // Remove separators like |---|---|
      clean = clean.replace(/\|/g, " ");        // Replace pipes with spaces so they aren't spoken

      return clean;
    }

    function renderMarkdown(md) {
      if (!md) return "";

      const lines = md.split('\n');
      let html = [];
      let inList = null; // 'ul', 'ol', or null
      let inBlockquote = false;
      let inCodeBlock = false;
      let codeBlockLines = [];
      let tableLines = [];

      const closeListIfNeeded = () => {
        if (inList) {
          html.push(`</${inList}>`);
          inList = null;
        }
      };

      const closeBlockquoteIfNeeded = () => {
        if (inBlockquote) {
          html.push(`</blockquote>`);
          inBlockquote = false;
        }
      };

      const closeTableIfNeeded = () => {
        if (tableLines.length > 0) {
          html.push(renderTable(tableLines));
          tableLines = [];
        }
      };

      const renderTable = (tblLines) => {
        let tableHtml = `<table style="border-collapse: collapse; width: 100%; margin: 10px 0; border: 1px solid #ccc; background-color: rgba(255,255,255,0.05);">`;
        let hasHeader = false;

        for (let i = 0; i < tblLines.length; i++) {
          const line = tblLines[i].trim();
          if (!line.startsWith('|') || !line.endsWith('|')) continue;

          // Skip separator line (e.g. |---|---|)
          if (i === 1 && line.replace(/[^|\s-]/g, '').trim() === line.replace(/[^\s]/g, '').trim()) {
            continue;
          }

          const cells = line.split('|').slice(1, -1).map(c => c.trim());
          const tag = (!hasHeader) ? 'th' : 'td';
          const cellStyle = tag === 'th'
            ? "border: 1px solid #ccc; padding: 6px 10px; font-weight: bold; background-color: rgba(0,0,0,0.1);"
            : "border: 1px solid #ccc; padding: 6px 10px;";

          let rowHtml = `<tr>`;
          for (const cell of cells) {
            rowHtml += `<${tag} style="${cellStyle}">${renderInlineMarkdown(cell)}</${tag}>`;
          }
          rowHtml += `</tr>`;

          if (!hasHeader) {
            tableHtml += `<thead>${rowHtml}</thead><tbody>`;
            hasHeader = true;
          } else {
            tableHtml += rowHtml;
          }
        }
        if (hasHeader) {
          tableHtml += `</tbody>`;
        }
        tableHtml += `</table>`;
        return tableHtml;
      };

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];
        const trimmed = line.trim();

        if (trimmed.startsWith('```')) {
          if (inCodeBlock) {
            html.push(`<pre style="background: rgba(0,0,0,0.05); border: 1px solid #ccc; padding: 8px; font-family: monospace; border-radius: 4px; overflow-x: auto; white-space: pre;">${codeBlockLines.join('\n')}</pre>`);
            codeBlockLines = [];
            inCodeBlock = false;
          } else {
            closeListIfNeeded();
            closeBlockquoteIfNeeded();
            closeTableIfNeeded();
            inCodeBlock = true;
          }
          continue;
        }

        if (inCodeBlock) {
          codeBlockLines.push(line.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"));
          continue;
        }

        if (trimmed.startsWith('|') && trimmed.endsWith('|')) {
          closeListIfNeeded();
          closeBlockquoteIfNeeded();
          tableLines.push(line);
          continue;
        } else {
          closeTableIfNeeded();
        }

        if (trimmed === '---' || trimmed === '***' || trimmed === '___') {
          closeListIfNeeded();
          closeBlockquoteIfNeeded();
          html.push('<hr style="margin: 16px 0; border: 0; border-top: 1px solid #ccc;" />');
          continue;
        }

        if (trimmed.startsWith('>')) {
          closeListIfNeeded();
          if (!inBlockquote) {
            html.push('<blockquote style="border-left: 4px solid #2563eb; padding-left: 12px; margin: 8px 0; font-style: italic; opacity: 0.85;">');
            inBlockquote = true;
          }
          const quoteText = line.substring(line.indexOf('>') + 1).trim();
          html.push(renderInlineMarkdown(quoteText) + '<br/>');
          continue;
        } else {
          closeBlockquoteIfNeeded();
        }

        if (trimmed.startsWith('#')) {
          closeListIfNeeded();
          const match = trimmed.match(/^(#{1,6})\s+(.*)$/);
          if (match) {
            const level = match[1].length;
            const headingText = match[2];
            const sizeMap = { 1: '1.8em', 2: '1.5em', 3: '1.3em', 4: '1.1em', 5: '1.0em', 6: '0.9em' };
            const size = sizeMap[level] || '1.2em';
            html.push(`<h${level} style="font-size: ${size}; margin: 12px 0 6px; font-weight: bold; line-height: 1.2;">${renderInlineMarkdown(headingText)}</h${level}>`);
            continue;
          }
        }

        const ulMatch = line.match(/^(\s*)[-*+]\s+(.*)$/);
        const olMatch = line.match(/^(\s*)\d+\.\s+(.*)$/);

        if (ulMatch) {
          if (inList !== 'ul') {
            closeListIfNeeded();
            html.push('<ul style="padding-left: 20px; margin: 8px 0; list-style-type: disc;">');
            inList = 'ul';
          }
          html.push(`<li style="margin: 4px 0;">${renderInlineMarkdown(ulMatch[2])}</li>`);
          continue;
        } else if (olMatch) {
          if (inList !== 'ol') {
            closeListIfNeeded();
            html.push('<ol style="padding-left: 20px; margin: 8px 0; list-style-type: decimal;">');
            inList = 'ol';
          }
          html.push(`<li style="margin: 4px 0;">${renderInlineMarkdown(olMatch[2])}</li>`);
          continue;
        } else {
          closeListIfNeeded();
        }

        if (trimmed === '') {
          html.push('<br/>');
        } else {
          html.push(`<p style="margin: 6px 0;">${renderInlineMarkdown(line)}</p>`);
        }
      }

      closeListIfNeeded();
      closeBlockquoteIfNeeded();
      closeTableIfNeeded();

      return html.join('\n');
    }

    function renderInlineMarkdown(text) {
      if (!text) return "";

      let result = text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");

      // Images: ![alt](url)
      result = result.replace(/!\[([^\]]*)]\(([^)]*)\)/g, '<span class="md-image" title="Imagem: $1" style="display: inline-flex; align-items: center; gap: 4px; border: 1px solid #ccc; padding: 2px 6px; background: rgba(0,0,0,0.05); border-radius: 4px; font-size: 0.9em; user-select: none;">🖼️ $1</span>');

      // Links: [text](url)
      result = result.replace(/\[([^\]]+)]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer" style="color: #2563eb; text-decoration: underline;">$1</a>');

      // Bold: **text** or __text__
      result = result.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      result = result.replace(/__([^_]+)__/g, '<strong>$1</strong>');

      // Italic: *text* or _text_
      result = result.replace(/\*([^*]+)\*/g, '<em>$1</em>');
      result = result.replace(/_([^_]+)_/g, '<em>$1</em>');

      // Strikethrough: ~~text~~
      result = result.replace(/~~([^~]+)~~/g, '<del>$1</del>');

      // Inline code: `code`
      result = result.replace(/`([^`]+)`/g, '<code style="background: rgba(0,0,0,0.05); border: 1px solid #ccc; padding: 2px 4px; font-family: monospace; border-radius: 3px; font-size: 0.9em;">$1</code>');

      return result;
    }

    function Modal({ title, onClose, children, width }) {
      const [position, setPosition] = useState({ x: null, y: null });
      const [isDragging, setIsDragging] = useState(false);
      const dragOffset = useRef({ x: 0, y: 0 });
      const modalBoxRef = useRef(null);

      // %%SECTION: EFFECTS - Modal ESC Key
      // ESC key handler
      useEffect(() => {
        const onKeyDown = (e) => {
          if (e.key === "Escape") {
            e.stopPropagation();   // Prevent event from reaching global handler
            onClose();
          }
        };
        window.addEventListener("keydown", onKeyDown, true); // capture = true
        return () => window.removeEventListener("keydown", onKeyDown, true);
      }, [onClose]);

      const onMouseDown = (e) => {
        // Não interrompe o clique em elementos interativos (inputs, selects, botões, etc.)
        const interactive = e.target.closest('input, select, button, textarea, label, .xp-btn, .xp-select, .xp-input');
        if (interactive) return;

        if (e.target.closest(".modal-close")) return;
        setIsDragging(true);
        const rect = modalBoxRef.current?.getBoundingClientRect();
        if (rect) {
          dragOffset.current = { x: e.clientX - rect.left, y: e.clientY - rect.top };
        }
        e.preventDefault();
      };

      // %%SECTION: EFFECTS - Modal Drag
      useEffect(() => {
        const onMouseMove = (e) => {
          if (!isDragging) return;
          const x = e.clientX - dragOffset.current.x;
          const y = e.clientY - dragOffset.current.y;
          setPosition({ x, y });
        };
        const onMouseUp = () => setIsDragging(false);
        window.addEventListener("mousemove", onMouseMove);
        window.addEventListener("mouseup", onMouseUp);
        return () => {
          window.removeEventListener("mousemove", onMouseMove);
          window.removeEventListener("mouseup", onMouseUp);
        };
      }, [isDragging]);

      const style = position.x !== null ? { width: width || "400px", left: position.x, top: position.y, right: "auto", bottom: "auto", position: "fixed" } : { width: width || "400px" };

      return (
        <div className="modal-overlay" onClick={onClose}>
          <div
            ref={modalBoxRef}
            className="modal-box"
            style={style}
            onClick={e => e.stopPropagation()}
            onMouseDown={onMouseDown}
          >
            <div className="modal-titlebar" style={{ cursor: "move" }}>
              <span>{title}</span>
              <button className="modal-close" onClick={onClose}>✕</button>
            </div>
            {children}
          </div>
        </div>
      );
    }

      /**
       * Processes a dropped or selected file and adds it as a new tab.
       * Supports PDF (via PDF.js), HTML/HTM (strips tags), and plain text files.
       * @param {File} file - The file to process
       */
      const processFile = useCallback(async (file) => {
        const ext = file.name.split(".").pop()?.toLowerCase();
        let fileText = "";
        try {
          if (ext === "pdf") {
            const buf = await file.arrayBuffer();
            const pdfjs = await loadPdfJs();
            const task = pdfjs.getDocument({ data: buf });
            const pdf = await task.promise;
            let extracted = "";
            for (let i = 1; i <= pdf.numPages; i++) {
              const page = await pdf.getPage(i);
              const content = await page.getTextContent();
              extracted += content.items.map(it => it.str).join(" ") + "\n";
            }
            fileText = extracted || "Não foi possível extrair textos deste PDF.";
          } else {
            fileText = await new Promise((resolve, reject) => {
              const reader = new FileReader();
              reader.onload = e => {
                let res = e.target.result;
                if (ext === "html" || ext === "htm") res = res.replace(/<[^>]*>/g, "");
                resolve(res);
              };
              reader.onerror = () => reject(new Error("Erro ao ler arquivo."));
              reader.readAsText(file);
            });
          }
          setTabs(prev => {
            const newTabs = [...prev, file.name];
            setTabTexts(prev2 => [...prev2, fileText]);
            setActiveTab(newTabs.length - 1);
            setText(fileText);
            setIsDirty(false);
            return newTabs;
          });
          handleStop();

      /**
       * Starts speech synthesis from a specific token index.

       * @param {number} startIdx - Token index to start reading from

       * @param {number} curPitch - Speech pitch (0-2)
       * @param {number} curVol - Speech volume (0-1)
       * @param {SpeechSynthesisVoice|null} curVoice - Selected voice
       */
      const playFromTokenIndex = useCallback((startIdx, curRate, curPitch, curVol, curVoice) => {
        // Áudio roteado automaticamente para o dispositivo padrão do sistema via Web Speech API
        window.speechSynthesis.cancel();
        wordSpansRef.current = tokens;
        const remaining = tokens.slice(startIdx);
        const remainingText = remaining.join("");

          setIsPlaying(false); setIsPaused(false);
          setCurrentWordIdx(-1); setReadWords(new Set()); return;

            }
          }
        } catch (e) {
          console.warn('[Áudio] Não foi possível inicializar AudioContext:', e);

        const totalChars = remainingText.length;
        speechTimerRef.current = { totalChars };

        const utter = new SpeechSynthesisUtterance(remainingText);
        if (curVoice) utter.voice = curVoice;
        utter.rate = curRate; utter.pitch = curPitch; utter.volume = curVol;
        utter.lang = curVoice?.lang || "pt-BR";
        utter.onboundary = e => {
          if (e.name !== "word") return;
          let acc = 0, rel = -1;
          for (let j = 0; j < remaining.length; j++) {
            if (e.charIndex >= acc && e.charIndex < acc + remaining[j].length) { rel = j; break; }
            acc += remaining[j].length;
          }
          if (rel !== -1) {
            const abs = startIdx + rel;
            activeTokenIdxRef.current = abs;
            setCurrentWordIdx(abs);
            
            // Usa versão debounced para evitar re-renderizações excessivas via innerHTML
            const next = new Set(readWords); // nota: capturado do estado; melhor usar prev em SetState
            setReadWords(prev => {
              const next = new Set(prev);
              // Mantém TODOS os tokens já lidos + marca os novos até a posição atual
              for (let k = readStartIdxRef.current; k <= abs; k++) {
                if (/\S/.test(tokens[k])) next.add(k);
              }
              return next;
            });
            // Nota: Embora a instrução pedisse updateReadWordsDebounced, 
            // o código acima usa setReadWords funcional. 
            // Vamos trocar para a debounced conforme solicitado explicitamente:
          }

          // Real-time remaining time calculation via onboundary
          const elapsed = e.elapsedTime;           // seconds elapsed (real API data)
          const charsDone = e.charIndex;           // chars read so far
          const charsTotal = speechTimerRef.current.totalChars;

          if (elapsed > 0 && charsDone > 0) {
            // Real observed rate: chars per second up to this point

            const charsLeft = charsTotal - charsDone;
            const secsLeft = Math.ceil(charsLeft / charsPerSec);

      const getCursorTokenIndex = useCallback(() => {

      const handlePause = useCallback(() => {

      useEffect(() => {

      // Handle cursor position updates

        if (!editorRef.current) return;

      // %%SECTION: EFFECTS - Global Hotkeys

      useEffect(() => {

      const addTab = useCallback(() => {

      const handleTextChange = useCallback((newText) => {

      const handleUndo = useCallback(() => {

          setText(prev);
          setIsDirty(true);
        }
      }, [activeTab, text]);

       * Redoes the next text change for the active tab.
       * Uses the per-tab history stack.
       */
      const handleRedo = useCallback(() => {
        const hist = getTabHistory(activeTab);
        if (hist.future.length > 0) {
          const next = hist.future.pop();
          if (hist.current !== undefined) {
            hist.past.push(hist.current);
          }
          hist.current = next;
          setText(next);
          setIsDirty(true);
        }
      }, [activeTab]);

      /**
       * Removes all Markdown formatting from the current document.

      const handleCleanMarkdown = useCallback(() => {
        setCustomConfirm({
          title: "Limpar marcações",

          onAccept: () => {
